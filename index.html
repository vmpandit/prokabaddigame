        // DEFENDER PICK SCREEN
        // ════════════════════════════════════════════════════
        _showDefenderPick() {
            // Clean up old UI if any
            if (this._defPickUI) { this._defPickUI.destroy(true); this._defPickUI = null; }

            const W = GAME_CONFIG.DESIGN_WIDTH, H = GAME_CONFIG.DESIGN_HEIGHT;
            const container = this.add.container(0, 0).setDepth(200).setScrollFactor(0);
            this._defPickUI = container;

            // Dimmed backdrop
            const bg = this.add.graphics().setScrollFactor(0);
            bg.fillStyle(0x0a0a12, 0.82);
            bg.fillRect(0, 0, W, H);
            container.add(bg);

            // Title
            const title = this.add.text(W/2, 100, 'DEFEND THIS RAID', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '28px', fontStyle: 'bold', color: '#44aaff',
                letterSpacing: 4,
            }).setOrigin(0.5).setScrollFactor(0);
            container.add(title);

            const subtitle = this.add.text(W/2, 140, 'Choose your defender', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '14px', color: 'rgba(255,255,255,0.5)',
                letterSpacing: 2,
            }).setOrigin(0.5).setScrollFactor(0);
            container.add(subtitle);

            // Defender cards
            const defNames = ['CORNER', 'CHAIN', 'COVER'];
            const defNums = ['2', '5', '8'];
            const defDescs = ['Fast & aggressive', 'Balanced all-rounder', 'Strong tackler'];
            const cardW = 180, cardH = 200, gap = 30;
            const totalW = 3 * cardW + 2 * gap;
            const startX = W/2 - totalW/2 + cardW/2;

            // Determine which slots are lost (highest indices first)
            const lostSlots = [];
            for (let j = 2; j >= 0 && lostSlots.length < this.teamMembersLost; j--) {
                lostSlots.push(j);
            }

            for (let i = 0; i < 3; i++) {
                const cx = startX + i * (cardW + gap);
                const cy = H/2 + 10;
                const isOut = lostSlots.includes(i);

                // Card background
                const card = this.add.graphics().setScrollFactor(0);
                if (isOut) {
                    card.fillStyle(0x333333, 0.15);
                    card.fillRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
                    card.lineStyle(2, 0x555555, 0.2);
                    card.strokeRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
                } else {
                    card.fillStyle(0x3090e8, 0.08);
                    card.fillRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
                    card.lineStyle(2, 0x3090e8, 0.3);
                    card.strokeRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
                }
                container.add(card);

                // Character preview
                const charGfx = this.add.graphics().setScrollFactor(0);
                ProceduralCharacterRenderer.drawCharacter(charGfx, {
                    bodyColor: isOut ? 0x444444 : GAME_CONFIG.COLORS.DEFENDER_BODY,
                    accentColor: isOut ? 0x333333 : 0x2070c0,
                    number: defNums[i], isRaider: false, state: 'idle',
                    animPhase: 0, facingX: -1,
                });
                charGfx.setPosition(cx, cy - 30);
                if (isOut) charGfx.setAlpha(0.3);
                container.add(charGfx);

                // Number
                const numTxt = this.add.text(cx, cy - 24, defNums[i], {
                    fontFamily: '"Segoe UI", system-ui, sans-serif',
                    fontSize: '16px', fontStyle: 'bold', color: isOut ? '#555555' : '#ffffff',
                }).setOrigin(0.5).setScrollFactor(0);
                container.add(numTxt);

                // Name & description
                const nameTxt = this.add.text(cx, cy + 40, isOut ? 'OUT' : defNames[i], {
                    fontFamily: '"Segoe UI", system-ui, sans-serif',
                    fontSize: '14px', fontStyle: 'bold', color: isOut ? '#ff4422' : '#44aaff',
                    letterSpacing: 2,
                }).setOrigin(0.5).setScrollFactor(0);
                container.add(nameTxt);

                const descTxt = this.add.text(cx, cy + 60, isOut ? 'Tackled in previous raid' : defDescs[i], {
                    fontFamily: '"Segoe UI", system-ui, sans-serif',
                    fontSize: '10px', color: isOut ? 'rgba(255,50,50,0.4)' : 'rgba(255,255,255,0.4)',
                }).setOrigin(0.5).setScrollFactor(0);
                container.add(descTxt);

                if (!isOut) {
                    // Hit area (only for available defenders)
                    const hitArea = this.add.rectangle(cx, cy, cardW, cardH)
                        .setInteractive({ useHandCursor: true }).setAlpha(0.001).setScrollFactor(0);
                    container.add(hitArea);

                    const defIdx = i;
                    hitArea.on('pointerover', () => {
                        card.clear();
                        card.fillStyle(0x3090e8, 0.2);
                        card.fillRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
                        card.lineStyle(2.5, 0x44ddff, 0.7);
                        card.strokeRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
                    });
                    hitArea.on('pointerout', () => {
                        card.clear();
                        card.fillStyle(0x3090e8, 0.08);
                        card.fillRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
                        card.lineStyle(2, 0x3090e8, 0.3);
                        card.strokeRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
                    });
                    hitArea.on('pointerdown', () => {
                        this._confirmDefenderPick(defIdx);
                    });
                } // end if (!isOut)
            }

            // Tip text
            const tip = this.add.text(W/2, H - 60, 'The AI raider will try to tag your team. Stop them!', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '11px', color: 'rgba(255,255,255,0.3)',
            }).setOrigin(0.5).setScrollFactor(0);
            container.add(tip);
        }

        _confirmDefenderPick(idx) {
            this.selectedDefenderIdx = idx;

            // Remove pick UI
            if (this._defPickUI) { this._defPickUI.destroy(true); this._defPickUI = null; }

            // Now reset positions with the chosen defender and start the countdown
            this.resetRaidPositions();

            // Show banner and start normal pre-raid countdown
            this.turnManager.phaseTimer = GAME_CONFIG.PHASE_PRE_RAID_TIME;
            const bannerEl = document.getElementById('turn-banner');
            const bannerTitle = document.getElementById('banner-title');
            const bannerSub = document.getElementById('banner-sub');
            bannerTitle.textContent = `RAID ${this.turnManager.currentTurn}`;
            bannerSub.textContent = 'You are DEFENDING — tackle the raider!';
            bannerEl.classList.add('show');
        }

        // ════════════════════════════════════════════════════
        // INPUT
        // ════════════════════════════════════════════════════
        setupDualTouchJoysticks() {
            const s=this;

            // Mobile touch polish: edge-swipe dead zone (prevents accidental browser gestures)
            const EDGE_MARGIN = 8; // px from screen edge to ignore touches (reduced for small screens)

            this.input.on('pointerdown',(p)=>{
                if(!this.turnManager.isRaidActive) return;

                // Edge-swipe prevention: ignore touches very near screen edges (use raw screen coords)
                const rawX = p.event ? (p.event.clientX != null ? p.event.clientX : p.x) : p.x;
                const rawY = p.event ? (p.event.clientY != null ? p.event.clientY : p.y) : p.y;
                const screenW = window.innerWidth, screenH = window.innerHeight;
                if (rawX < EDGE_MARGIN || rawX > screenW - EDGE_MARGIN ||
                    rawY < EDGE_MARGIN || rawY > screenH - EDGE_MARGIN) return;

                // p.x is already in game coordinates with Scale.FIT
                if(p.x<GAME_CONFIG.DESIGN_WIDTH*0.5&&!s.leftJoystickActive){
                    s.leftJoystickActive=true;s.leftJoystickPointerID=p.id;
                    // Joystick repositions to touch point
                    s.leftJoystickOrigin.x=p.x;s.leftJoystickOrigin.y=p.y;
                    s.leftJoystickBase.setPosition(p.x,p.y).setVisible(true);
                    s.leftJoystickThumb.setPosition(p.x,p.y).setVisible(true);
                } else if(p.x>=GAME_CONFIG.DESIGN_WIDTH*0.5&&!s.rightJoystickActive){
                    s.rightJoystickActive=true;s.rightJoystickPointerID=p.id;
                    s.rightJoystickOrigin.x=p.x;s.rightJoystickOrigin.y=p.y;
                    s.rightJoystickBase.setPosition(p.x,p.y).setVisible(true);
                    s.rightJoystickThumb.setPosition(p.x,p.y).setVisible(true);
                }
            });
            this.input.on('pointermove',(p)=>{
                if(s.leftJoystickActive&&p.id===s.leftJoystickPointerID){
                    const r=this.computeJoystick(p,s.leftJoystickOrigin);s.leftJoystickThumb.setPosition(r.thumbX,r.thumbY);
                    if(r.magnitude<GAME_CONFIG.JOYSTICK_DEADZONE){s.moveVector.x=0;s.moveVector.y=0;}
                    else{s.moveVector.x=Math.cos(r.angle)*r.magnitude;s.moveVector.y=Math.sin(r.angle)*r.magnitude;}
                }
                if(s.rightJoystickActive&&p.id===s.rightJoystickPointerID){
                    const r=this.computeJoystick(p,s.rightJoystickOrigin);s.rightJoystickThumb.setPosition(r.thumbX,r.thumbY);
                    if(r.magnitude<GAME_CONFIG.JOYSTICK_DEADZONE){s.aimVector.x=0;s.aimVector.y=0;}
                    else{s.aimVector.x=Math.cos(r.angle)*r.magnitude;s.aimVector.y=Math.sin(r.angle)*r.magnitude;}
                }
            });
            const up=(p)=>{
                if(p.id===s.leftJoystickPointerID){s.leftJoystickActive=false;s.leftJoystickPointerID=null;s.moveVector.x=0;s.moveVector.y=0;s.leftJoystickBase.setVisible(false);s.leftJoystickThumb.setVisible(false);}
                if(p.id===s.rightJoystickPointerID){
                    if(Math.abs(s.aimVector.x)>0.1||Math.abs(s.aimVector.y)>0.1) s.triggerAction(s.aimVector.x,s.aimVector.y);
                    s.rightJoystickActive=false;s.rightJoystickPointerID=null;s.aimVector.x=0;s.aimVector.y=0;
                    s.rightJoystickBase.setVisible(false);s.rightJoystickThumb.setVisible(false);if(s.aimLine)s.aimLine.clear();
                }
            };
            this.input.on('pointerup',up);this.input.on('pointerupoutside',up);
        }

        computeJoystick(p,o){const dx=p.x-o.x,dy=p.y-o.y,d=Math.sqrt(dx*dx+dy*dy),m=GAME_CONFIG.JOYSTICK_RADIUS,c=Math.min(d,m),a=Math.atan2(dy,dx);return{angle:a,magnitude:c/m,thumbX:o.x+Math.cos(a)*c,thumbY:o.y+Math.sin(a)*c};}

        createJoystickGraphics(){
            const r=GAME_CONFIG.JOYSTICK_RADIUS;
            this.leftJoystickBase=this.add.graphics().setDepth(100).setVisible(false).setScrollFactor(0);
            this.leftJoystickBase.lineStyle(2,0xffffff,0.2);this.leftJoystickBase.strokeCircle(0,0,r);this.leftJoystickBase.fillStyle(0xffffff,0.05);this.leftJoystickBase.fillCircle(0,0,r);
            this.leftJoystickThumb=this.add.graphics().setDepth(101).setVisible(false).setScrollFactor(0);
            this.leftJoystickThumb.fillStyle(0xffffff,0.3);this.leftJoystickThumb.fillCircle(0,0,28);this.leftJoystickThumb.lineStyle(2,0xffffff,0.5);this.leftJoystickThumb.strokeCircle(0,0,28);
            this.rightJoystickBase=this.add.graphics().setDepth(100).setVisible(false).setScrollFactor(0);
            this.rightJoystickBase.lineStyle(2,0xff6644,0.25);this.rightJoystickBase.strokeCircle(0,0,r);this.rightJoystickBase.fillStyle(0xff6644,0.06);this.rightJoystickBase.fillCircle(0,0,r);
            this.rightJoystickThumb=this.add.graphics().setDepth(101).setVisible(false).setScrollFactor(0);
            this.rightJoystickThumb.fillStyle(0xff6644,0.35);this.rightJoystickThumb.fillCircle(0,0,26);this.rightJoystickThumb.lineStyle(2,0xff6644,0.6);this.rightJoystickThumb.strokeCircle(0,0,26);
        }

        setupKeyboardInput(){
            this.wasdKeys=this.input.keyboard.addKeys({up:Phaser.Input.Keyboard.KeyCodes.W,down:Phaser.Input.Keyboard.KeyCodes.S,left:Phaser.Input.Keyboard.KeyCodes.A,right:Phaser.Input.Keyboard.KeyCodes.D});
            this.input.keyboard.on('keydown-SPACE',()=>{if(!this.turnManager.isRaidActive)return;if(!this.ultimateSystem.tryActivate())this.triggerAction(Math.cos(this.facingAngle),Math.sin(this.facingAngle));});
            this.input.keyboard.on('keydown-E',()=>{if(!this.turnManager.isRaidActive)return;this.ultimateSystem.tryActivate();});
            this.input.keyboard.on('keydown-C',()=>{if(!this.turnManager.isRaidActive)return;this.triggerChainTackle();});
            this.input.on('pointerdown',(p)=>{if(!this.turnManager.isRaidActive)return;if((p.button===0||p.button==null)&&!this.leftJoystickActive&&!this.rightJoystickActive){const w=this.cameras.main.getWorldPoint(p.x,p.y);const dx=w.x-this.player.x,dy=w.y-this.player.y,m=Math.sqrt(dx*dx+dy*dy);if(m>5)this.triggerAction(dx/m,dy/m);}});
        }

        readKeyboardInput(){
            if(this.leftJoystickActive||!this.turnManager.isRaidActive)return;
            let kx=0,ky=0;if(this.wasdKeys.left.isDown)kx-=1;if(this.wasdKeys.right.isDown)kx+=1;if(this.wasdKeys.up.isDown)ky-=1;if(this.wasdKeys.down.isDown)ky+=1;
            const m=Math.sqrt(kx*kx+ky*ky);if(m>0){this.moveVector.x=kx/m;this.moveVector.y=ky/m;}else{this.moveVector.x=0;this.moveVector.y=0;}
        }

        updateControlsHint(){
            const isRaider=this.turnManager.isPlayerRaider;
            const action=isRaider?'Dash':'Tackle';
            this.controlsText.setText(this.sys.game.device.input.touch
                ? `Left: Move | Right: Aim+Release=${action} | E: Ultimate`
                : isRaider
                    ? `WASD: Move | Click: Dash | Space: Dash/Ult | E: Ultimate`
                    : `WASD: Move | Click: Tackle | Space: Tackle/Ult | C: Chain | E: Ult`);
        }

        // ════════════════════════════════════════════════════
        // ACTION: Dash (raider) or Tackle (defender)
        // Unified trigger — behavior depends on role
        // ════════════════════════════════════════════════════
        triggerAction(dx,dy) {
            if(this.playerState===ENTITY_STATE.DASHING||this.playerState===ENTITY_STATE.TACKLING||this.playerState===ENTITY_STATE.STUNNED)return;
            if(this.dashCooldownTimer>0)return;

            if (this.turnManager.isPlayerRaider) {
                // DASH
                this.playerState=ENTITY_STATE.DASHING;
                this.dashTimer=GAME_CONFIG.DASH_DURATION; this.dashCooldownTimer=GAME_CONFIG.DASH_COOLDOWN;
                window.HapticsManager.dash(); window.SoundEngine.playDash();
            } else {
                // TACKLE LUNGE
                this.playerState=ENTITY_STATE.TACKLING;
                this.dashTimer=GAME_CONFIG.TACKLE_DURATION; this.dashCooldownTimer=GAME_CONFIG.TACKLE_COOLDOWN;
                window.HapticsManager.dash(); window.SoundEngine.playDash();
            }
            this.dashDirection.x=dx; this.dashDirection.y=dy; this.dashTrailTimer=0;
            // Spawn tackle arc for defender action
            if (!this.turnManager.isPlayerRaider) {
                this.vfx.spawnTackleArc(this.player.x, this.player.y, dx, dy, GAME_CONFIG.COLORS.TRAIL_DEFENDER);
            }
        }

        updateAction(dt) {
            if(this.playerState!==ENTITY_STATE.DASHING&&this.playerState!==ENTITY_STATE.TACKLING) return;
            this.dashTimer-=dt*1000;
            if(this.dashTimer<=0){this.playerState=ENTITY_STATE.IDLE;return;}

            const isRaider=this.turnManager.isPlayerRaider;
            const ultActive=this.ultimateSystem.active;
            const speedBase=isRaider?GAME_CONFIG.DASH_SPEED:GAME_CONFIG.TACKLE_SPEED;
            const speedMult=ultActive?(isRaider?GAME_CONFIG.ULT_SPEED_MULT:GAME_CONFIG.DEF_ULT_SPEED_MULT):1;
            const speed=speedBase*speedMult;

            let nx=this.player.x+this.dashDirection.x*speed*dt;
            let ny=this.player.y+this.dashDirection.y*speed*dt*GAME_CONFIG.ISO_Y_SCALE;
            if(this.courtBounds){nx=Phaser.Math.Clamp(nx,this.courtBounds.x,this.courtBounds.right);ny=Phaser.Math.Clamp(ny,this.courtBounds.y,this.courtBounds.bottom);}
            this.player.setPosition(nx,ny);

            // Trail
            this.dashTrailTimer-=dt*1000;
            if(this.dashTrailTimer<=0){
                const c=isRaider?(ultActive?GAME_CONFIG.COLORS.AURA_AGILITY:GAME_CONFIG.COLORS.TRAIL_RAIDER):(ultActive?GAME_CONFIG.COLORS.AURA_STRENGTH:GAME_CONFIG.COLORS.TRAIL_DEFENDER);
                this.vfx.spawnTrailStamp(nx,ny,c,this.dashDirection.x,this.dashDirection.y,isRaider);this.dashTrailTimer=GAME_CONFIG.TRAIL_INTERVAL;
            }

            // Collision check
            if(isRaider) this.checkTagCollisions(nx,ny);
            else this.checkPlayerTackleOnAIRaider(nx,ny);
        }

        // ════════════════════════════════════════════════════
        // COLLISION: Raider tags defenders
        // ════════════════════════════════════════════════════
        checkTagCollisions(rx,ry) {
            this.defenders.forEach(def=>{
                if(def.state===ENTITY_STATE.TAGGED||def.state===ENTITY_STATE.STUNNED) return;
                const dx=def.container.x-rx,dy=def.container.y-ry;
                if(Math.sqrt(dx*dx+dy*dy)<GAME_CONFIG.TAG_RANGE) this.onDefenderTagged(def);
            });
        }

        onDefenderTagged(def) {
            def.state=ENTITY_STATE.TAGGED; def.stunTimer=1500;
            // Super Raid: double points per tag
            const pts = this.superRaidActive ? KABADDI_RULES.SUPER_RAID_MULTIPLIER : 1;
            this.raiderScore += pts;
            document.getElementById('hud-raider-score').textContent=this.raiderScore;
            this.tagsThisRaid = (this.tagsThisRaid || 0) + 1;
            this.ultimateSystem.addMeter(GAME_CONFIG.ULT_GAIN_TAG);
            if (this.comboSystem) this.comboSystem.addHit();
            // Mark defender as OUT for subsequent turns
            const defIdx = this.defenders.indexOf(def);
            if (defIdx >= 0) this.defendersOut[defIdx] = true;
            const mx=(this.player.x+def.container.x)/2,my=(this.player.y+def.container.y)/2;
            this.vfx.triggerFullImpact(mx,my,GAME_CONFIG.COLORS.TRAIL_RAIDER);
            this.tweens.add({targets:def.container,alpha:0.3,yoyo:true,repeat:3,duration:100});
            // Show floating score
            if (this.superRaidActive) {
                this._showFloatingText(mx, my - 30, `+${pts} SUPER!`, '#ff4422');
            }
        }

        // ════════════════════════════════════════════════════
        // COLLISION: Defender tackles raider (AI or player)
        // ════════════════════════════════════════════════════
        checkDefenderTackleHit(def,dx,dy) {
            // When player is raider
            if(this.turnManager.isPlayerRaider) {
                if(this.playerState===ENTITY_STATE.OUT||this.playerState===ENTITY_STATE.STUNNED)return;
                if(this.ultimateSystem.active&&GAME_CONFIG.ULT_IFRAMES){
                    const d=Math.sqrt((this.player.x-dx)**2+(this.player.y-dy)**2);
                    if(d<GAME_CONFIG.TAG_RANGE*1.5) this.ultimateSystem.addMeter(GAME_CONFIG.ULT_GAIN_DODGE);
                    return;
                }
                if(Math.sqrt((this.player.x-dx)**2+(this.player.y-dy)**2)<GAME_CONFIG.TAG_RANGE) this.onRaiderTackled(def);
            } else {
                // AI raider
                if(this.aiRaiderState===ENTITY_STATE.STUNNED||this.aiRaiderState===ENTITY_STATE.OUT) return;
                if(Math.sqrt((this.aiRaider.x-dx)**2+(this.aiRaider.y-dy)**2)<GAME_CONFIG.TAG_RANGE) this.onAIRaiderTackled(def);
            }
        }

        // Player tackle hits AI raider
        checkPlayerTackleOnAIRaider(px,py) {
            if(this.aiRaiderState===ENTITY_STATE.STUNNED||this.aiRaiderState===ENTITY_STATE.OUT) return;
            const tackleRange = this.ultimateSystem.active ? GAME_CONFIG.TAG_RANGE * GAME_CONFIG.DEF_ULT_TACKLE_MULT : GAME_CONFIG.TAG_RANGE;
            if(Math.sqrt((this.aiRaider.x-px)**2+(this.aiRaider.y-py)**2)<tackleRange) this.onAIRaiderTackled({container:this.player});
        }

        onRaiderTackled(def) {
            if(this.playerState===ENTITY_STATE.OUT) return;
            this.playerState=ENTITY_STATE.STUNNED; def.state=ENTITY_STATE.IDLE;
            this.defenderScore++; document.getElementById('hud-defender-score').textContent=this.defenderScore;
            if (this.comboSystem) this.comboSystem.reset();
            // Player's team loses a member (shown when player defends next)
            this.teamMembersLost = Math.min(this.teamMembersLost + 1, 2); // can't lose all 3
            const mx=(this.player.x+def.container.x)/2,my=(this.player.y+def.container.y)/2;
            this.vfx.triggerFullImpact(mx,my,GAME_CONFIG.COLORS.TRAIL_DEFENDER);
            this.tweens.add({targets:this.player,alpha:0.3,yoyo:true,repeat:4,duration:100,onComplete:()=>{this.playerState=ENTITY_STATE.IDLE;this.player.setAlpha(1);}});
            this.turnManager.endRaid('tackled');
        }

        onAIRaiderTackled(tackler) {
            if(this.aiRaiderState===ENTITY_STATE.OUT) return;
            this.aiRaiderState=ENTITY_STATE.STUNNED;
            this.defenderScore++; document.getElementById('hud-defender-score').textContent=this.defenderScore;
            const mx=(this.aiRaider.x+tackler.container.x)/2,my=(this.aiRaider.y+tackler.container.y)/2;
            this.vfx.triggerFullImpact(mx,my,GAME_CONFIG.COLORS.TRAIL_DEFENDER);
            this.tweens.add({targets:this.aiRaider,alpha:0.3,yoyo:true,repeat:4,duration:100,onComplete:()=>{this.aiRaiderState=ENTITY_STATE.IDLE;this.aiRaider.setAlpha(1);}});
            this.ultimateSystem.addMeter(GAME_CONFIG.ULT_GAIN_TAG); // reward tackle
            if (this.comboSystem && this.turnManager.isPlayerDefender) this.comboSystem.addHit();
            this.turnManager.endRaid('tackled');
        }

        // ════════════════════════════════════════════════════
        // SAFE RETURN DETECTION + BONUS LINE + LOBBY RULE
        // ════════════════════════════════════════════════════
        _checkRaiderReturn() {
            if (!this.turnManager.isRaidActive) return;
            const midX = GAME_CONFIG.COURT.CENTER_X;
            const bonusX = midX + GAME_CONFIG.COURT.BAULK_OFFSET + 80; // bonus line X

            if (this.turnManager.isPlayerRaider) {
                // ── Bonus Line Check ──
                if (!this.bonusClaimed && this.player.x > bonusX) {
                    this.bonusClaimed = true;
                    this.raiderScore += KABADDI_RULES.BONUS_LINE_POINTS;
                    document.getElementById('hud-raider-score').textContent = this.raiderScore;
                    // VFX + floating text
                    this._showFloatingText(this.player.x, this.player.y - 60, '+1 BONUS!', '#44aaff');
                    this.vfx.spawnUltBurst(this.player.x, this.player.y, 0x44aaff);
                    window.SoundEngine.playImpact(0.5);
                }

                // ── Baulk crossing ──
                if (this.player.x > midX + 10) {
                    this.raiderCrossedBaulk = true;
                }

                // ── Safe return ──
                if (this.raiderCrossedBaulk && this.player.x < midX - 10) {
                    this._onRaidReturn();
                }
            } else {
                // AI raider checks
                if (!this.bonusClaimed && this.aiRaider.x > bonusX) {
                    this.bonusClaimed = true;
                    this.raiderScore += KABADDI_RULES.BONUS_LINE_POINTS;
                    document.getElementById('hud-raider-score').textContent = this.raiderScore;
                    this._showFloatingText(this.aiRaider.x, this.aiRaider.y - 60, '+1 BONUS!', '#44aaff');
                    this.vfx.spawnUltBurst(this.aiRaider.x, this.aiRaider.y, 0x44aaff);
                }
                if (this.aiRaider.x > midX + 10) {
                    this.raiderCrossedBaulk = true;
                }
                if (this.raiderCrossedBaulk && this.aiRaider.x < midX - 10) {
                    this._onRaidReturn();
                }
            }

            // ── Lobby Rule: Defenders get stunned if they enter the lobby without tackling ──
            this._checkLobbyFouls();
        }

        // ════════════════════════════════════════════════════
        // RAID RETURN — handles scoring, do-or-die, all-out, revival
        // ════════════════════════════════════════════════════
        _onRaidReturn() {
            const taggedThisRaid = this.defenders.filter(d => d.state === ENTITY_STATE.TAGGED).length;

            // Do-or-Die check: if active and no tags, penalty
            if (this.doOrDieActive && taggedThisRaid === 0 && !this.bonusClaimed) {
                this.defenderScore += KABADDI_RULES.DO_OR_DIE_PENALTY;
                document.getElementById('hud-defender-score').textContent = this.defenderScore;
                this.turnManager.endRaid('dod_fail');
                return;
            }

            // Track empty raids for Do-or-Die
            if (taggedThisRaid === 0 && !this.bonusClaimed) {
                this.consecutiveEmptyRaids++;
            } else {
                this.consecutiveEmptyRaids = 0;
            }

            // ── Revival system: each tag revives a lost teammate ──
            if (this.turnManager.isPlayerRaider && taggedThisRaid > 0) {
                let revivals = Math.min(taggedThisRaid, this.teamMembersLost);
                if (revivals > 0) {
                    this.teamMembersLost -= revivals;
                    this._showFloatingText(
                        GAME_CONFIG.COURT.CENTER_X, GAME_CONFIG.COURT.CENTER_Y - 50,
                        `${revivals} TEAMMATE${revivals>1?'S':''} REVIVED!`, '#44ff88'
                    );
                }
            }

            // ── All Out check: are all defenders now out? ──
            this._checkAllOut();

            this.turnManager.endRaid('returned');
        }

        // ════════════════════════════════════════════════════
        // ALL OUT — all defenders eliminated = bonus + revive
        // ════════════════════════════════════════════════════
        _checkAllOut() {
            if (this.turnManager.isPlayerRaider) {
                // Check if all opponent defenders are OUT
                const allOut = this.defendersOut.every(d => d === true);
                if (allOut) {
                    // Award bonus points
                    this.raiderScore += KABADDI_RULES.ALL_OUT_BONUS;
                    document.getElementById('hud-raider-score').textContent = this.raiderScore;

                    // Revive all defenders (opponent gets their team back)
                    this.defendersOut = [false, false, false];

                    // Show dramatic ALL OUT banner
                    this._showFloatingText(
                        GAME_CONFIG.COURT.CENTER_X, GAME_CONFIG.COURT.CENTER_Y - 80,
                        'ALL OUT! +' + KABADDI_RULES.ALL_OUT_BONUS + ' BONUS', '#ff4422'
                    );

                    // Big VFX burst
                    this.vfx.spawnUltBurst(GAME_CONFIG.COURT.CENTER_X, GAME_CONFIG.COURT.CENTER_Y, 0xff4422);
                    window.SoundEngine.playImpact(0.9);
                }
            }
        }

        // ════════════════════════════════════════════════════
        // LOBBY RULE — defenders foul if entering lobby without tackling
        // ════════════════════════════════════════════════════
        _checkLobbyFouls() {
            const C = GAME_CONFIG.COURT;
            const lobbyLeft = C.CENTER_X - C.WIDTH/2;
            const lobbyRight = C.CENTER_X + C.WIDTH/2;
            const lobbyTop = C.CENTER_Y - C.HEIGHT/2;
            const lobbyBottom = C.CENTER_Y + C.HEIGHT/2;
            const margin = C.LOBBY_WIDTH * 0.6; // inner edge of lobby zone

            this.defenders.forEach((def, i) => {
                if (def.state === ENTITY_STATE.TAGGED || def.state === ENTITY_STATE.OUT || def.state === ENTITY_STATE.STUNNED) return;
                // Only check AI defenders (skip player-controlled slot when defending)
                if (!this.turnManager.isPlayerRaider && i === this.selectedDefenderIdx) return;

                const x = def.container.x, y = def.container.y;
                const inLobby = x < lobbyLeft + margin || x > lobbyRight - margin ||
                                y < lobbyTop + margin || y > lobbyBottom - margin;

                if (inLobby && def.state !== ENTITY_STATE.TACKLING) {
                    // Foul! Stun the defender briefly and push them back
                    def.state = ENTITY_STATE.STUNNED;
                    def.stunTimer = KABADDI_RULES.LOBBY_STUN_DURATION;
                    def.container.setAlpha(0.4);
                    this._showFloatingText(x, y - 40, 'LOBBY FOUL!', '#ff8844');
                }
            });
        }

        // ════════════════════════════════════════════════════
        // FLOATING TEXT UTILITY
        // ════════════════════════════════════════════════════
        _showFloatingText(x, y, text, color) {
            const label = this.add.text(x, y, text, {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '16px', fontStyle: 'bold', color: color,
                stroke: '#000000', strokeThickness: 4
            }).setOrigin(0.5).setDepth(200);
            this.tweens.add({
                targets: label, y: y - 50, alpha: 0, duration: 1500,
                ease: 'Power2', onComplete: () => label.destroy()
            });
        }

        // ════════════════════════════════════════════════════
        // CHAIN TACKLE SYSTEM
        // When defender calls chain, nearby AI defenders rush toward raider together
        // ════════════════════════════════════════════════════
        triggerChainTackle() {
            if (this.turnManager.isPlayerRaider) return; // only defenders can chain
            if (!this.turnManager.isRaidActive) return;
            if (this.chainActive) return; // already active
            if (this.chainCooldown > 0) return;

            this.chainActive = true;
            this.chainCooldown = 5000; // 5 second cooldown

            // Visual + audio feedback
            window.SoundEngine.playImpact(0.4);

            // Flash "CHAIN!" text above player
            const chainLabel = this.add.text(this.player.x, this.player.y - 70, 'CHAIN!', {
                fontSize: '18px', fontStyle: 'bold', color: '#44ddff',
                stroke: '#002244', strokeThickness: 4
            }).setOrigin(0.5).setDepth(100);
            this.tweens.add({
                targets: chainLabel, y: chainLabel.y - 40, alpha: 0, duration: 1200,
                ease: 'Power2', onComplete: () => chainLabel.destroy()
            });

            // Draw chain links between nearby defenders and player
            const raiderX = this.aiRaider.x, raiderY = this.aiRaider.y;
            this.defenders.forEach((def, i) => {
                if (i === this.selectedDefenderIdx) return; // skip player slot
                if (def.state === ENTITY_STATE.TAGGED || def.state === ENTITY_STATE.OUT || def.state === ENTITY_STATE.STUNNED) return;

                // Boost aggro range and speed for 3 seconds
                def._chainBoost = true;
                def._chainTimer = 3000;
                def.aggroRange = 600; // massively increased
                def.pursuitSpeed = 200; // faster pursuit
                def._reactionTimer = 9999; // skip reaction delay

                // Visual: link line to player
                const linkGfx = this.add.graphics().setDepth(50);
                linkGfx.lineStyle(2, 0x44ddff, 0.6);
                linkGfx.lineBetween(this.player.x, this.player.y, def.container.x, def.container.y);
                this.tweens.add({ targets: linkGfx, alpha: 0, duration: 800, onComplete: () => linkGfx.destroy() });
            });

            // After 3 seconds, deactivate chain
            this.time.delayedCall(3000, () => {
                this.chainActive = false;
                this.defenders.forEach((def, i) => {
                    if (def._chainBoost) {
                        def._chainBoost = false;
                        def.aggroRange = def._originalAggro || 200;
                        def.pursuitSpeed = def._originalSpeed || 120;
                    }
                });
            });
        }

        // ════════════════════════════════════════════════════
        // DEFENDER AI (unchanged core, aware of raider source)
        // ════════════════════════════════════════════════════
        updateDefenderAI(dt) {
            if(!this.turnManager.isRaidActive) return;
            // Determine raider position (player or AI)
            const raiderX = this.turnManager.isPlayerRaider ? this.player.x : this.aiRaider.x;
            const raiderY = this.turnManager.isPlayerRaider ? this.player.y : this.aiRaider.y;
            const raiderAlive = this.turnManager.isPlayerRaider ? (this.playerState!==ENTITY_STATE.OUT) : (this.aiRaiderState!==ENTITY_STATE.OUT);

            // Difficulty scaling factors
            const dc = this.diffConfig;
            const spdMult = dc.speedMult;
            const aggroMult = dc.aggroMult;
            const tackleAcc = dc.tackleAccuracy;
            const reactDelay = dc.reactionDelay;

            this.defenders.forEach((def,i)=>{
                // Skip the defender slot the player controls
                if(!this.turnManager.isPlayerRaider && i===this.selectedDefenderIdx) return;

                if(def.tackleCooldownTimer>0) def.tackleCooldownTimer-=dt*1000;

                // Reaction delay: if defender recently spotted raider, add delay before pursuing
                if (!def._reactionTimer) def._reactionTimer = 0;

                if(def.state===ENTITY_STATE.TAGGED||def.state===ENTITY_STATE.STUNNED){
                    def.stunTimer-=dt*1000;if(def.stunTimer<=0){def.state=ENTITY_STATE.IDLE;def.container.setAlpha(1);}
                    this.drawEntityShadow(def.shadow,def.container.x,def.container.y,0.5);return;
                }
                if(def.state===ENTITY_STATE.TACKLING){
                    def.tackleTimer-=dt*1000;if(def.tackleTimer<=0){def.state=ENTITY_STATE.IDLE;}
                    else{
                        let nx=def.container.x+def.tackleDir.x*GAME_CONFIG.TACKLE_SPEED*spdMult*dt;
                        let ny=def.container.y+def.tackleDir.y*GAME_CONFIG.TACKLE_SPEED*spdMult*dt*GAME_CONFIG.ISO_Y_SCALE;
                        if(this.courtBounds){nx=Phaser.Math.Clamp(nx,this.courtBounds.x,this.courtBounds.right);ny=Phaser.Math.Clamp(ny,this.courtBounds.y,this.courtBounds.bottom);}
                        def.container.setPosition(nx,ny);
                        this.vfx.spawnTrailStamp(nx,ny,GAME_CONFIG.COLORS.TRAIL_DEFENDER,def.tackleDir.x,def.tackleDir.y,false);
                        this.checkDefenderTackleHit(def,nx,ny);
                    }
                    this.drawEntityShadow(def.shadow,def.container.x,def.container.y,1);def.container.setDepth(10+def.container.y*0.01);return;
                }

                const ddx=raiderX-def.container.x,ddy=raiderY-def.container.y;
                const dist=Math.sqrt(ddx*ddx+ddy*ddy);
                const effectiveAggro = def.aggroRange * aggroMult;
                if(dist<effectiveAggro&&raiderAlive){
                    // Reaction delay: don't pursue until timer expires
                    if (def._reactionTimer < reactDelay) {
                        def._reactionTimer += dt * 1000;
                        def.state = ENTITY_STATE.IDLE;
                        this.drawEntityShadow(def.shadow,def.container.x,def.container.y,1);def.container.setDepth(10+def.container.y*0.01);
                        return;
                    }

                    def.state=ENTITY_STATE.MOVING;
                    const ndx=ddx/dist,ndy=ddy/dist;
                    let nx=def.container.x+ndx*def.pursuitSpeed*spdMult*dt;
                    let ny=def.container.y+ndy*def.pursuitSpeed*spdMult*dt*GAME_CONFIG.ISO_Y_SCALE;
                    if(this.courtBounds){nx=Phaser.Math.Clamp(nx,this.courtBounds.x,this.courtBounds.right);ny=Phaser.Math.Clamp(ny,this.courtBounds.y,this.courtBounds.bottom);}
                    def.container.setPosition(nx,ny);
                    if(dist<GAME_CONFIG.TACKLE_RANGE&&def.tackleCooldownTimer<=0){
                        // Tackle accuracy gate: lower difficulties miss more often
                        if (Math.random() < tackleAcc) {
                            def.state=ENTITY_STATE.TACKLING;def.tackleTimer=GAME_CONFIG.TACKLE_DURATION;
                            def.tackleCooldownTimer=GAME_CONFIG.TACKLE_COOLDOWN;def.tackleDir.x=ndx;def.tackleDir.y=ndy;
                            this.vfx.spawnTackleArc(def.container.x,def.container.y,ndx,ndy,GAME_CONFIG.COLORS.TRAIL_DEFENDER);
                        } else {
                            // Missed tackle — go on cooldown anyway
                            def.tackleCooldownTimer = GAME_CONFIG.TACKLE_COOLDOWN * 1.5;
                        }
                    }
                }else{
                    def.state=ENTITY_STATE.IDLE;
                    def._reactionTimer = 0; // Reset reaction timer when raider leaves aggro
                    const hx=def.homeX-def.container.x,hy=def.homeY-def.container.y,hd=Math.sqrt(hx*hx+hy*hy);
                    if(hd>5){def.container.x+=hx/hd*60*dt;def.container.y+=hy/hd*60*dt*GAME_CONFIG.ISO_Y_SCALE;}
                }
                this.drawEntityShadow(def.shadow,def.container.x,def.container.y,1);def.container.setDepth(10+def.container.y*0.01);
            });
        }

        // ══════════════════════════════════════════════════
        // AI RAIDER BEHAVIOR (Agent Physics — Slice 4)
        // Seeks nearest untagged defender, dashes to tag, evades tackles.
        // ══════════════════════════════════════════════════
        updateAIRaider(dt) {
            if(!this.turnManager.isRaidActive || this.turnManager.isPlayerRaider) return;
            if(this.aiRaiderState===ENTITY_STATE.STUNNED||this.aiRaiderState===ENTITY_STATE.OUT) return;
            if(this.aiRaiderDashCD>0) this.aiRaiderDashCD-=dt*1000;

            // ── If currently dashing ──
            if(this.aiRaiderState===ENTITY_STATE.DASHING) {
                this.aiRaiderDashTimer-=dt*1000;
                if(this.aiRaiderDashTimer<=0){this.aiRaiderState=ENTITY_STATE.MOVING;}
                else{
                    const s=GAME_CONFIG.DASH_SPEED;
                    let nx=this.aiRaider.x+this.aiRaiderDashDir.x*s*dt;
                    let ny=this.aiRaider.y+this.aiRaiderDashDir.y*s*dt*GAME_CONFIG.ISO_Y_SCALE;
                    if(this.courtBounds){nx=Phaser.Math.Clamp(nx,this.courtBounds.x,this.courtBounds.right);ny=Phaser.Math.Clamp(ny,this.courtBounds.y,this.courtBounds.bottom);}
                    this.aiRaider.setPosition(nx,ny);
                    this.vfx.spawnTrailStamp(nx,ny,GAME_CONFIG.COLORS.TRAIL_RAIDER,this.aiRaiderDashDir.x,this.aiRaiderDashDir.y,true);

                    // Check tag on defenders
                    this.defenders.forEach(def=>{
                        if(def.state===ENTITY_STATE.TAGGED||def.state===ENTITY_STATE.STUNNED)return;
                        if(Math.sqrt((def.container.x-nx)**2+(def.container.y-ny)**2)<GAME_CONFIG.TAG_RANGE){
                            this.onAIRaiderTagsDefender(def);
                        }
                    });
                    // Check tag on player (who is a defender)
                    if(Math.sqrt((this.player.x-nx)**2+(this.player.y-ny)**2)<GAME_CONFIG.TAG_RANGE){
                        this.onPlayerDefenderTagged();
                    }
                }
                this.drawEntityShadow(this.aiRaiderShadow,this.aiRaider.x,this.aiRaider.y,1);
                this.aiRaider.setDepth(10+this.aiRaider.y*0.01);
                return;
            }

            // ── Find nearest threat (defender close by) ──
            let closestThreat=null, closestThreatDist=Infinity;
            // Check player defender
            const pdx=this.player.x-this.aiRaider.x, pdy=this.player.y-this.aiRaider.y;
            const pdist=Math.sqrt(pdx*pdx+pdy*pdy);
            if(pdist<GAME_CONFIG.AI_RAIDER_FLEE_RANGE){closestThreat={x:this.player.x,y:this.player.y};closestThreatDist=pdist;}

            this.defenders.forEach(def=>{
                if(def.state===ENTITY_STATE.TAGGED||def.state===ENTITY_STATE.STUNNED)return;
                const dx=def.container.x-this.aiRaider.x,dy=def.container.y-this.aiRaider.y;
                const d=Math.sqrt(dx*dx+dy*dy);
                if(d<GAME_CONFIG.AI_RAIDER_FLEE_RANGE&&d<closestThreatDist){
                    closestThreat={x:def.container.x,y:def.container.y};closestThreatDist=d;
                }
            });

            // ── Find nearest target to tag ──
            let target=null, targetDist=Infinity;
            this.defenders.forEach(def=>{
                if(def.state===ENTITY_STATE.TAGGED||def.state===ENTITY_STATE.STUNNED)return;
                const dx=def.container.x-this.aiRaider.x,dy=def.container.y-this.aiRaider.y;
                const d=Math.sqrt(dx*dx+dy*dy);
                if(d<targetDist){target={x:def.container.x,y:def.container.y};targetDist=d;}
            });
            // Also consider player as target
            if(pdist<targetDist&&this.playerState!==ENTITY_STATE.STUNNED){
                target={x:this.player.x,y:this.player.y};targetDist=pdist;
            }

            // ── Decide movement ──
            let moveX=0, moveY=0;

            // RETURN MODE: AI raider tries to get back to own half after tagging
            if (this.aiRaiderReturning) {
                // Head toward own half (left side, past midline)
                const homeX = GAME_CONFIG.COURT.CENTER_X - 200;
                const homeY = GAME_CONFIG.COURT.CENTER_Y;
                const hx = homeX - this.aiRaider.x, hy = homeY - this.aiRaider.y;
                const hd = Math.sqrt(hx*hx + hy*hy);
                if (hd > 5) { moveX = hx/hd; moveY = hy/hd; }

                // Evade nearby defenders while returning
                if (closestThreat && closestThreatDist < GAME_CONFIG.AI_RAIDER_FLEE_RANGE * 0.5) {
                    const fx = this.aiRaider.x - closestThreat.x, fy = this.aiRaider.y - closestThreat.y;
                    const fd = Math.sqrt(fx*fx + fy*fy);
                    if (fd > 0) { moveX = (moveX + fx/fd) * 0.5; moveY = (moveY + fy/fd) * 0.5; }
                    const nm = Math.sqrt(moveX*moveX + moveY*moveY);
                    if (nm > 0) { moveX /= nm; moveY /= nm; }
                }
            } else if(closestThreat && closestThreatDist < GAME_CONFIG.AI_RAIDER_FLEE_RANGE * 0.7) {
                // EVADE: move away from nearest threat
                const fx=this.aiRaider.x-closestThreat.x, fy=this.aiRaider.y-closestThreat.y;
                const fd=Math.sqrt(fx*fx+fy*fy);
                if(fd>0){moveX=fx/fd;moveY=fy/fd;}
            } else if(target && targetDist < GAME_CONFIG.AI_RAIDER_AGGRO) {
                // APPROACH: move toward nearest untagged defender
                const tx=target.x-this.aiRaider.x,ty=target.y-this.aiRaider.y;
                const td=Math.sqrt(tx*tx+ty*ty);
                if(td>0){moveX=tx/td;moveY=ty/td;}

                // DASH to tag if close and cooldown ready
                if(targetDist<GAME_CONFIG.TACKLE_RANGE && this.aiRaiderDashCD<=0){
                    this.aiRaiderState=ENTITY_STATE.DASHING;
                    this.aiRaiderDashTimer=GAME_CONFIG.DASH_DURATION;
                    this.aiRaiderDashCD=GAME_CONFIG.AI_RAIDER_DASH_COOLDOWN;
                    this.aiRaiderDashDir.x=moveX;this.aiRaiderDashDir.y=moveY;
                    window.SoundEngine.playDash();
                    return;
                }
            } else {
                // WANDER: drift toward right half (defender territory)
                const wx=GAME_CONFIG.COURT.CENTER_X+100-this.aiRaider.x;
                const wy=GAME_CONFIG.COURT.CENTER_Y-this.aiRaider.y;
                const wd=Math.sqrt(wx*wx+wy*wy);
                if(wd>20){moveX=wx/wd;moveY=wy/wd;}
            }

            // Apply movement
            const spd=GAME_CONFIG.AI_RAIDER_SPEED;
            let nx=this.aiRaider.x+moveX*spd*dt;
            let ny=this.aiRaider.y+moveY*spd*dt*GAME_CONFIG.ISO_Y_SCALE;
            if(this.courtBounds){nx=Phaser.Math.Clamp(nx,this.courtBounds.x,this.courtBounds.right);ny=Phaser.Math.Clamp(ny,this.courtBounds.y,this.courtBounds.bottom);}
            this.aiRaider.setPosition(nx,ny);
            this.aiRaiderState=ENTITY_STATE.MOVING;

            // Proximity tag check during normal movement
            this.defenders.forEach(def=>{
                if(def.state===ENTITY_STATE.TAGGED||def.state===ENTITY_STATE.STUNNED)return;
                if(Math.sqrt((def.container.x-nx)**2+(def.container.y-ny)**2)<GAME_CONFIG.TAG_RANGE){
                    this.onAIRaiderTagsDefender(def);
                }
            });
            // Check tag on player defender during normal movement
            if(this.playerState!==ENTITY_STATE.STUNNED&&this.playerState!==ENTITY_STATE.OUT){
                if(Math.sqrt((this.player.x-nx)**2+(this.player.y-ny)**2)<GAME_CONFIG.TAG_RANGE){
                    this.onPlayerDefenderTagged();
                }
            }

            this.drawEntityShadow(this.aiRaiderShadow,this.aiRaider.x,this.aiRaider.y,1);
            this.aiRaider.setDepth(10+this.aiRaider.y*0.01);
        }

        onAIRaiderTagsDefender(def) {
            def.state=ENTITY_STATE.TAGGED;def.stunTimer=1500;
            this.raiderScore++;document.getElementById('hud-raider-score').textContent=this.raiderScore;
            this.aiRaiderTagCount++;
            const mx=(this.aiRaider.x+def.container.x)/2,my=(this.aiRaider.y+def.container.y)/2;
            this.vfx.triggerFullImpact(mx,my,GAME_CONFIG.COLORS.TRAIL_RAIDER);
            this.tweens.add({targets:def.container,alpha:0.3,yoyo:true,repeat:3,duration:100});
            // After tagging, AI raider has a chance to try returning
            if (this.aiRaiderTagCount >= 1 && Math.random() < 0.5 + this.aiRaiderTagCount * 0.2) {
                this.aiRaiderReturning = true;
            }
        }

        onPlayerDefenderTagged() {
            if(this.playerState===ENTITY_STATE.STUNNED||this.playerState===ENTITY_STATE.OUT) return;
            // Invulnerability during defender ultimate
            if(this.ultimateSystem.active) return;

            this.playerState=ENTITY_STATE.STUNNED;
            this.raiderScore++;document.getElementById('hud-raider-score').textContent=this.raiderScore;
            if (this.comboSystem) this.comboSystem.reset();
            const mx=(this.aiRaider.x+this.player.x)/2,my=(this.aiRaider.y+this.player.y)/2;
            this.vfx.triggerFullImpact(mx,my,GAME_CONFIG.COLORS.TRAIL_RAIDER);
            this.tweens.add({targets:this.player,alpha:0.3,yoyo:true,repeat:4,duration:100,onComplete:()=>{this.playerState=ENTITY_STATE.IDLE;this.player.setAlpha(1);}});
        }

        // ════════════════════════════════════════════════════
        // AIM LINE
        // ════════════════════════════════════════════════════
        drawAimLine(){
            if(!this.aimLine)return;this.aimLine.clear();if(!this.rightJoystickActive)return;
            if(Math.abs(this.aimVector.x)<0.1&&Math.abs(this.aimVector.y)<0.1)return;
            const px=this.player.x,py=this.player.y,len=120;
            const ex=px+this.aimVector.x*len,ey=py+this.aimVector.y*len*GAME_CONFIG.ISO_Y_SCALE;
            const aimColor=this.turnManager.isPlayerRaider?GAME_CONFIG.COLORS.DASH_AIM:GAME_CONFIG.COLORS.TACKLE_AIM;
            this.aimLine.lineStyle(2,aimColor,0.5);this.drawDashedLine(this.aimLine,px,py-10,ex,ey-10,6,4);
            const a=Math.atan2(ey-py,ex-px),al=10;this.aimLine.fillStyle(aimColor,0.6);
            this.aimLine.fillTriangle(ex,ey-10,ex-Math.cos(a-0.4)*al,ey-10-Math.sin(a-0.4)*al,ex-Math.cos(a+0.4)*al,ey-10-Math.sin(a+0.4)*al);
        }

        // ════════════════════════════════════════════════════
        // UPDATE LOOP
        // ════════════════════════════════════════════════════
        update(time,delta) {
            if(!this.player)return;
            const dt=delta/1000;

            this.turnManager.update(dt);
            this.ultimateSystem.update(dt);
            if (this.comboSystem) this.comboSystem.update(dt);
            if(this.dashCooldownTimer>0) this.dashCooldownTimer-=delta;

            // Slice 5: Formation rotation timer
            if (this.turnManager.isRaidActive && this.turnManager.isPlayerRaider) {
                this.formationTimer -= delta;
                if (this.formationTimer <= 0) {
                    this._rotateFormation();
                    this.formationTimer = this.diffConfig.formationSwapTime;
                }
            }

            if(this.turnManager.isRaidActive) {
                this.readKeyboardInput();

                // ── Player action (dash/tackle) ──
                if(this.playerState===ENTITY_STATE.DASHING||this.playerState===ENTITY_STATE.TACKLING){
                    this.updateAction(dt);
                } else if(this.playerState!==ENTITY_STATE.STUNNED&&this.playerState!==ENTITY_STATE.OUT){
                    const ultActive=this.ultimateSystem.active;
                    const isR=this.turnManager.isPlayerRaider;
                    const sMult=ultActive?(isR?GAME_CONFIG.ULT_SPEED_MULT:GAME_CONFIG.DEF_ULT_SPEED_MULT):1;
                    const speed=GAME_CONFIG.PLAYER_SPEED*sMult;
                    let nx=this.player.x+this.moveVector.x*speed*dt;
                    let ny=this.player.y+this.moveVector.y*speed*dt*GAME_CONFIG.ISO_Y_SCALE;
                    if(this.courtBounds){nx=Phaser.Math.Clamp(nx,this.courtBounds.x,this.courtBounds.right);ny=Phaser.Math.Clamp(ny,this.courtBounds.y,this.courtBounds.bottom);}
                    this.player.setPosition(nx,ny);
                    if(Math.abs(this.moveVector.x)>0.01||Math.abs(this.moveVector.y)>0.01) this.playerState=ENTITY_STATE.MOVING;
                    else if(this.playerState===ENTITY_STATE.MOVING) this.playerState=ENTITY_STATE.IDLE;
                }

                // Footstep sounds
                if(this.playerState===ENTITY_STATE.MOVING){
                    this.footstepTimer-=dt;
                    if(this.footstepTimer<=0){window.SoundEngine.playFootstep();this.footstepTimer=0.25;}
                }

                // Facing
                if(this.rightJoystickActive&&(Math.abs(this.aimVector.x)>0.1||Math.abs(this.aimVector.y)>0.1))
                    this.facingAngle=Math.atan2(this.aimVector.y,this.aimVector.x);
                else if(Math.abs(this.moveVector.x)>0.1||Math.abs(this.moveVector.y)>0.1)
                    this.facingAngle=Math.atan2(this.moveVector.y,this.moveVector.x);
                this.facingIndicator.setRotation(this.facingAngle+Math.PI/2);

                // ── Proximity tag check during normal raider movement ──
                if (this.turnManager.isPlayerRaider &&
                    this.playerState !== ENTITY_STATE.DASHING &&
                    this.playerState !== ENTITY_STATE.STUNNED &&
                    this.playerState !== ENTITY_STATE.OUT) {
                    this.checkTagCollisions(this.player.x, this.player.y);
                }

                // ── AI systems ──
                this.updateDefenderAI(dt);
                this.updateAIRaider(dt);

                // ── Chain tackle cooldown ──
                if (this.chainCooldown > 0) this.chainCooldown -= dt * 1000;

                // ── Safe-return detection ──
                this._checkRaiderReturn();

                // ── Near-miss dodge meter (raider only) ──
                if(this.turnManager.isPlayerRaider&&!this.ultimateSystem.active){
                    this.defenders.forEach(def=>{
                        if(def.state===ENTITY_STATE.TACKLING){
                            const d=Math.sqrt((this.player.x-def.container.x)**2+(this.player.y-def.container.y)**2);
                            if(d<GAME_CONFIG.TACKLE_RANGE*1.3&&d>GAME_CONFIG.TAG_RANGE) this.ultimateSystem.addMeter(GAME_CONFIG.ULT_GAIN_DODGE*dt);
                        }
                    });
                }
            }

            // ── VFX + ANIMATION (always) ──
            this.drawEntityShadow(this.playerShadow, this.player.x, this.player.y, 1);
            this.glowPulsePhase+=dt*3.5;

            // ── Animate & redraw characters (Phase 5: dirty-check optimization) ──
            this.animSystem.update('player', dt, this.playerState, this.moveVector.x);
            const pAnim = this.animSystem.getParams('player');
            const isR = this.turnManager.isPlayerRaider;
            if (pAnim.dirty) {
                ProceduralCharacterRenderer.drawCharacter(this.playerBodyGfx, {
                    bodyColor: isR ? GAME_CONFIG.COLORS.PLAYER_BODY : GAME_CONFIG.COLORS.DEFENDER_BODY,
                    accentColor: isR ? 0xcc3a20 : 0x2070c0,
                    isRaider: isR, state: pAnim.state,
                    animPhase: pAnim.animPhase, facingX: pAnim.facingX,
                });
                this.animSystem.markDrawn('player');
            }

            // Redraw defenders (only when dirty)
            this.defenders.forEach((def, i) => {
                const dx = (this.turnManager.isPlayerRaider ? this.player.x : this.aiRaider.x) - def.container.x;
                this.animSystem.update('def_'+i, dt, def.state, dx);
                if (def.bodyGfx) {
                    const da = this.animSystem.getParams('def_'+i);
                    if (da.dirty) {
                        ProceduralCharacterRenderer.drawCharacter(def.bodyGfx, {
                            bodyColor: GAME_CONFIG.COLORS.DEFENDER_BODY, accentColor: 0x2070c0,
                            isRaider: false, state: da.state,
                            animPhase: da.animPhase, facingX: da.facingX,
                        });
                        this.animSystem.markDrawn('def_'+i);
                    }
                }
            });

            // Redraw AI raider (only when dirty)
            if (this.aiRaider.visible && this.aiRaiderBodyGfx) {
                const arMoveX = this.aiRaider.x - (this.aiRaider.getData('prevX') || this.aiRaider.x);
                this.aiRaider.setData('prevX', this.aiRaider.x);
                this.animSystem.update('aiRaider', dt, this.aiRaiderState, arMoveX);
                const arAnim = this.animSystem.getParams('aiRaider');
                if (arAnim.dirty) {
                    ProceduralCharacterRenderer.drawCharacter(this.aiRaiderBodyGfx, {
                        bodyColor: GAME_CONFIG.COLORS.PLAYER_BODY, accentColor: 0xcc3a20,
                        isRaider: true, state: arAnim.state,
                        animPhase: arAnim.animPhase, facingX: arAnim.facingX,
                    });
                    this.animSystem.markDrawn('aiRaider');
                }
            }

            // Player glow
            if(this.turnManager.isPlayerRaider || this.ultimateSystem.active) {
                const gc=this.ultimateSystem.active?(this.turnManager.isPlayerRaider?GAME_CONFIG.COLORS.AURA_AGILITY:GAME_CONFIG.COLORS.AURA_STRENGTH):GAME_CONFIG.COLORS.GLOW_PULSE;
                this.drawGlowRing(this.playerGlowRing,this.player.x,this.player.y,this.glowPulsePhase,gc);
            }

            // Cant ring — on whichever entity is the raider
            if(this.turnManager.isRaidActive){
                if(this.turnManager.isPlayerRaider){
                    this.vfx.drawCantRing(this.cantRingGfx,this.player.x,this.player.y,this.turnManager.cantRatio,this.glowPulsePhase);
                    this.aiCantRingGfx.clear();
                } else {
                    this.vfx.drawCantRing(this.aiCantRingGfx,this.aiRaider.x,this.aiRaider.y,this.turnManager.cantRatio,this.glowPulsePhase);
                    this.cantRingGfx.clear();
                    // AI raider glow
                    this.drawGlowRing(this.aiRaiderGlow,this.aiRaider.x,this.aiRaider.y,this.glowPulsePhase,GAME_CONFIG.COLORS.GLOW_PULSE);
                }
            } else { this.cantRingGfx.clear(); this.aiCantRingGfx.clear(); }

            // Torch particles (courtyard)
            if(this.currentEnv==='courtyard') this.vfx.updateTorchParticles(dt);

            // Phase 3: Animate spectator crowd (redraw every ~200ms for performance)
            this.arenaTime += dt;
            if (!this._lastCrowdDraw || this.arenaTime - this._lastCrowdDraw > 0.2) {
                PremiumCourtRenderer.drawSpectators(this.spectatorGfx, this.currentEnv, this.arenaTime);
                this._lastCrowdDraw = this.arenaTime;
            }

            this.drawAimLine();
            this.player.setDepth(10+this.player.y*0.01);
        }
    }
    window.MainGameScene = MainGameScene;
    </script>

    <!-- ════════════════════════════════════════════════════
         PHASER BOOT
         ════════════════════════════════════════════════════ -->
    <script>
    const phaserConfig = {
        type: Phaser.WEBGL, parent:'game-container',
        scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH,width:GAME_CONFIG.DESIGN_WIDTH,height:GAME_CONFIG.DESIGN_HEIGHT,min:{width:320,height:180},max:{width:1920,height:1080}},
        backgroundColor:'#0a0a12',antialias:true,
        input:{activePointers:4,touch:{capture:true,target:document.getElementById('game-container')}},
        fps:{target:60}, scene:[MenuScene, TutorialScene, MainGameScene],
    };
    const game = new Phaser.Game(phaserConfig);
    document.addEventListener('visibilitychange',()=>{if(document.hidden)game.scene.scenes.forEach(s=>{if(s.scene.isActive())s.scene.pause();});else game.scene.scenes.forEach(s=>{if(s.scene.isPaused())s.scene.resume();});});
    window.addEventListener('contextmenu',e=>e.preventDefault());
    </script>
