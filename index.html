            if (overlay) overlay.classList.add('hidden');
        }

        _showRulesOverlay() {
            const W = GAME_CONFIG.DESIGN_WIDTH, H = GAME_CONFIG.DESIGN_HEIGHT;

            // Container for the entire overlay
            const overlay = this.add.container(0, 0).setDepth(500);

            // Dark backdrop
            const bg = this.add.graphics();
            bg.fillStyle(0x0a0a12, 0.92);
            bg.fillRect(0, 0, W, H);
            overlay.add(bg);

            // Scrollable panel background
            const panelW = 700, panelH = 560;
            const px = (W - panelW) / 2, py = (H - panelH) / 2;
            const panel = this.add.graphics();
            panel.fillStyle(0x141420, 1);
            panel.fillRoundedRect(px, py, panelW, panelH, 12);
            panel.lineStyle(2, 0xf0c040, 0.3);
            panel.strokeRoundedRect(px, py, panelW, panelH, 12);
            overlay.add(panel);

            // Title
            const title = this.add.text(W/2, py + 30, 'KABADDI — RULES & HISTORY', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '20px', fontStyle: 'bold',
                color: '#f0c040', letterSpacing: '4px',
            }).setOrigin(0.5, 0);
            overlay.add(title);

            // History paragraph
            const historyText = `Kabaddi is one of the oldest contact sports in the world, with roots tracing back over 4,000 years to ancient India. The name comes from the Tamil word "kai-pidi" meaning "holding hands." Traditionally played in villages as a test of strength, speed, and wit, it was formalized as a competitive sport in the 20th century. Today, Pro Kabaddi League (PKL) has made it one of India's most-watched sports, blending ancient tradition with modern athleticism in packed arenas.`;

            const histLabel = this.add.text(px + 25, py + 65, historyText, {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '12px', color: 'rgba(255,255,255,0.65)',
                wordWrap: { width: panelW - 50 }, lineSpacing: 4,
            });
            overlay.add(histLabel);

            // Rules section
            const rulesY = py + 165;
            const rulesTitle = this.add.text(W/2, rulesY, 'HOW TO PLAY', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '16px', fontStyle: 'bold',
                color: '#f0c040', letterSpacing: '3px',
            }).setOrigin(0.5, 0);
            overlay.add(rulesTitle);

            const rules = [
                ['RAIDING', '#e85030', 'On your turn, cross the midline into enemy territory. Tag defenders by touching them (move close or dash). Cross BACK to your half to score! Each tag = 1 point. You must return before the cant timer (breath) runs out.'],
                ['DEFENDING', '#3090e8', 'When the opponent raids, pick a defender to control. Tackle the raider with Space/Click to stop them. Press C to call a Chain Tackle — your AI teammates rush the raider together.'],
                ['BONUS LINE', '#44aaff', 'Cross the bonus line (deep in enemy territory) for +1 extra point. High risk, high reward!'],
                ['SUPER RAID', '#ff4422', 'When your team has lost members, tags are worth DOUBLE. Fight back from behind!'],
                ['DO-OR-DIE', '#ff8844', 'After 2 empty raids in a row, your next raid is Do-or-Die. You MUST score or the defenders get a free point.'],
                ['ALL OUT', '#44ff88', 'Tag all 3 defenders out and earn +2 bonus points. All defenders revive for the next raid.'],
                ['REVIVAL', '#88ff44', 'Each defender you tag during a raid revives one of your knocked-out teammates.'],
                ['LOBBY FOUL', '#ff8844', 'Defenders caught in the lobby (court edges) without tackling get stunned — a free opening for the raider!'],
                ['ULTIMATE', '#f0c040', 'Build your meter by tagging or dodging tackles. Press E to activate — speed boost and invincibility!'],
            ];

            let ry = rulesY + 30;
            rules.forEach(([name, color, desc]) => {
                const nameLabel = this.add.text(px + 25, ry, name, {
                    fontFamily: '"Segoe UI", system-ui, sans-serif',
                    fontSize: '11px', fontStyle: 'bold',
                    color: color, letterSpacing: '2px',
                });
                overlay.add(nameLabel);
                const descLabel = this.add.text(px + 140, ry, desc, {
                    fontFamily: '"Segoe UI", system-ui, sans-serif',
                    fontSize: '10.5px', color: 'rgba(255,255,255,0.55)',
                    wordWrap: { width: panelW - 175 }, lineSpacing: 2,
                });
                overlay.add(descLabel);
                ry += Math.max(descLabel.height, 18) + 10;
            });

            // Close button
            const closeY = py + panelH - 40;
            const closeBtn = this.add.graphics();
            closeBtn.fillStyle(0xf0c040, 0.15);
            closeBtn.fillRoundedRect(W/2 - 60, closeY - 14, 120, 28, 6);
            closeBtn.lineStyle(1.5, 0xf0c040, 0.4);
            closeBtn.strokeRoundedRect(W/2 - 60, closeY - 14, 120, 28, 6);
            overlay.add(closeBtn);
            const closeTxt = this.add.text(W/2, closeY, 'CLOSE', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '12px', fontStyle: 'bold',
                color: '#f0c040', letterSpacing: '3px',
            }).setOrigin(0.5);
            overlay.add(closeTxt);
            const closeHit = this.add.rectangle(W/2, closeY, 120, 28).setInteractive({ useHandCursor: true }).setAlpha(0.001);
            overlay.add(closeHit);
            closeHit.on('pointerdown', () => { overlay.destroy(true); });
        }
    }
    window.MenuScene = MenuScene;
    </script>

    <!-- ================================================================
         TUTORIAL SCENE — Interactive walkthrough (Slice 6)
         Step-by-step guided tutorial: Move → Dash → Tag → Tackle → Ult
         ================================================================ -->
    <script>
    class TutorialScene extends Phaser.Scene {
        constructor() { super({ key: 'TutorialScene' }); }

        create() {
            const W = GAME_CONFIG.DESIGN_WIDTH, H = GAME_CONFIG.DESIGN_HEIGHT;
            const COURT = GAME_CONFIG.COURT;
            this.isMobile = !!this.sys.game.device.input.touch;

            // ── Court background (simplified) ──
            const courtGfx = this.add.graphics();
            courtGfx.fillStyle(0x0a0a12, 1);
            courtGfx.fillRect(0, 0, W, H);
            courtGfx.fillStyle(GAME_CONFIG.COLORS.COURT_FILL, 1);
            const cx = COURT.CENTER_X, cy = COURT.CENTER_Y;
            const cw = COURT.WIDTH, ch = COURT.HEIGHT;
            courtGfx.fillRoundedRect(cx - cw/2, cy - ch/2, cw, ch, 12);
            courtGfx.lineStyle(2, GAME_CONFIG.COLORS.COURT_BORDER, 0.6);
            courtGfx.strokeRoundedRect(cx - cw/2, cy - ch/2, cw, ch, 12);
            courtGfx.lineStyle(1.5, GAME_CONFIG.COLORS.MIDLINE, 0.4);
            courtGfx.lineBetween(cx, cy - ch/2, cx, cy + ch/2);

            // ── Player entity ──
            this.playerGfx = this.add.graphics().setDepth(20);
            this.playerPos = { x: cx - 200, y: cy };
            this._drawPlayer();

            // ── Dummy defenders (3 stationary targets) ──
            this.dummies = [];
            const dummyPositions = [
                { x: cx + 160, y: cy - 90 },
                { x: cx + 220, y: cy + 30 },
                { x: cx + 130, y: cy + 100 },
            ];
            dummyPositions.forEach((p, i) => {
                const g = this.add.graphics().setDepth(15);
                const s = this.add.graphics().setDepth(5);
                const dummy = { x: p.x, y: p.y, gfx: g, shadow: s, tagged: false, stunTimer: 0 };
                this._drawDummy(dummy);
                this.dummies.push(dummy);
            });

            // ── Highlight ring (pulsing target indicator) ──
            this.highlightGfx = this.add.graphics().setDepth(30);
            this.highlightPhase = 0;
            this.highlightTarget = null;

            // ── Movement input ──
            this.moveVector = { x: 0, y: 0 };
            this.aimVector = { x: 0, y: 0 };
            this.facingAngle = 0;
            this.isDashing = false;
            this.dashTimer = 0;
            this.dashCooldown = 0;
            this.dashDir = { x: 0, y: 0 };

            // Joystick state
            this.leftJoystickActive = false; this.leftJoystickPointerID = null;
            this.leftJoystickOrigin = { x: 0, y: 0 };
            this.rightJoystickActive = false; this.rightJoystickPointerID = null;
            this.rightJoystickOrigin = { x: 0, y: 0 };

            // Joystick graphics
            this._createJoysticks();

            // Keyboard
            this.wasdKeys = this.input.keyboard.addKeys({
                up: Phaser.Input.Keyboard.KeyCodes.W, down: Phaser.Input.Keyboard.KeyCodes.S,
                left: Phaser.Input.Keyboard.KeyCodes.A, right: Phaser.Input.Keyboard.KeyCodes.D,
            });
            this.input.keyboard.on('keydown-SPACE', () => this._triggerDash());

            // Touch joystick input
            this._setupTouch();

            // Mouse click for dash
            this.input.on('pointerdown', (p) => {
                if (!this.isMobile && !this.leftJoystickActive && !this.rightJoystickActive) {
                    if (p.button === 0) {
                        const w = this.cameras.main.getWorldPoint(p.x, p.y);
                        const dx = w.x - this.playerPos.x, dy = w.y - this.playerPos.y;
                        const m = Math.sqrt(dx*dx + dy*dy);
                        if (m > 5) { this.aimVector.x = dx/m; this.aimVector.y = dy/m; this._triggerDash(); }
                    }
                }
            });

            // ── Tutorial Steps ──
            this.steps = [
                {
                    title: 'WELCOME TO KABADDI',
                    text: this.isMobile
                        ? 'You are the RAIDER (red).\nTouch LEFT side and drag to MOVE.'
                        : 'You are the RAIDER (red).\nUse WASD keys to MOVE around the court.',
                    condition: () => this._playerMoved,
                    onEnter: () => { this._playerMoved = false; this._moveAccum = 0; },
                },
                {
                    title: 'MOVE TO THE MARKER',
                    text: 'Walk to the glowing marker near the center.',
                    condition: () => {
                        const dx = this.playerPos.x - cx, dy = this.playerPos.y - cy;
                        return Math.sqrt(dx*dx + dy*dy) < 60;
                    },
                    onEnter: () => { this.highlightTarget = { x: cx, y: cy }; },
                },
                {
                    title: 'DASH ATTACK',
                    text: this.isMobile
                        ? 'Aim with the RIGHT joystick and release to DASH.\nDash into a blue defender to TAG them!'
                        : 'Click on a blue defender to DASH into them.\n(Or press SPACE to dash forward.)',
                    condition: () => this.dummies.some(d => d.tagged),
                    onEnter: () => {
                        this.highlightTarget = this.dummies[0];
                        this.dummies.forEach(d => { d.tagged = false; this._drawDummy(d); });
                    },
                },
                {
                    title: 'TAG ALL DEFENDERS',
                    text: 'Great! Now tag the remaining defenders.\nEach tag scores points for your team.',
                    condition: () => this.dummies.every(d => d.tagged),
                    onEnter: () => { this.highlightTarget = this.dummies.find(d => !d.tagged) || null; },
                },
                {
                    title: 'RETURN TO SAFETY',
                    text: 'After tagging, cross back to YOUR side (left)\nto score and survive the raid!',
                    condition: () => this.playerPos.x < cx - 60,
                    onEnter: () => { this.highlightTarget = { x: cx - 250, y: cy }; },
                },
                {
                    title: 'YOU\'RE READY!',
                    text: 'You now know the basics:\nMove, Dash, Tag, and Return.\n\nTap anywhere to start playing!',
                    condition: () => this._finalTap,
                    onEnter: () => {
                        this.highlightTarget = null;
                        this._finalTap = false;
                        this.input.once('pointerdown', () => { this._finalTap = true; });
                        this.input.keyboard.once('keydown', () => { this._finalTap = true; });
                    },
                },
            ];
            this.currentStep = 0;
            this._playerMoved = false;
            this._moveAccum = 0;
            this._finalTap = false;

            // ── UI: Instruction panel ──
            this.instrBg = this.add.graphics().setDepth(90).setScrollFactor(0);
            this.instrTitle = this.add.text(W/2, 38, '', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '20px', fontStyle: 'bold', color: '#f0c040',
                letterSpacing: 3,
            }).setOrigin(0.5).setDepth(91).setScrollFactor(0);

            this.instrText = this.add.text(W/2, 72, '', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '13px', color: 'rgba(255,255,255,0.7)',
                align: 'center', lineSpacing: 5,
            }).setOrigin(0.5, 0).setDepth(91).setScrollFactor(0);

            // Step counter
            this.stepCounter = this.add.text(W - 20, H - 20, '', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '10px', color: 'rgba(240,192,64,0.3)',
            }).setOrigin(1, 1).setDepth(91).setScrollFactor(0);

            // Skip button
            const skipBg = this.add.graphics().setDepth(90).setScrollFactor(0);
            skipBg.fillStyle(0xffffff, 0.06);
            skipBg.fillRoundedRect(W - 100, 10, 80, 30, 6);
            skipBg.lineStyle(1, 0xffffff, 0.15);
            skipBg.strokeRoundedRect(W - 100, 10, 80, 30, 6);
            this.add.text(W - 60, 25, 'SKIP', {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: '11px', fontStyle: 'bold', color: 'rgba(255,255,255,0.4)',
                letterSpacing: 2,
            }).setOrigin(0.5).setDepth(91).setScrollFactor(0);
            const skipHit = this.add.rectangle(W - 60, 25, 80, 30).setInteractive({ useHandCursor: true }).setAlpha(0.001).setDepth(92).setScrollFactor(0);
            skipHit.on('pointerdown', () => this.scene.start('MenuScene'));

            // Court bounds for clamping
            this.courtBounds = new Phaser.Geom.Rectangle(
                cx - cw/2 + 10, cy - ch/2 + 10, cw - 20, ch - 20
            );

            // Start first step
            this._enterStep(0);

            // Hide loading overlay
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('hidden');
        }

        _enterStep(idx) {
            if (idx >= this.steps.length) {
                this.scene.start('MenuScene');
                return;
            }
            this.currentStep = idx;
            const step = this.steps[idx];
            if (step.onEnter) step.onEnter();
            this.instrTitle.setText(step.title);
            this.instrText.setText(step.text);
            this.stepCounter.setText(`Step ${idx+1} / ${this.steps.length}`);

            // Redraw instruction background
            const W = GAME_CONFIG.DESIGN_WIDTH;
            const textH = 30 + this.instrText.height;
            this.instrBg.clear();
            this.instrBg.fillStyle(0x0a0a12, 0.8);
            this.instrBg.fillRoundedRect(W/2 - 300, 8, 600, textH + 30, 10);
            this.instrBg.lineStyle(1, 0xf0c040, 0.2);
            this.instrBg.strokeRoundedRect(W/2 - 300, 8, 600, textH + 30, 10);
        }

        _drawPlayer() {
            const g = this.playerGfx;
            g.clear();
            const x = 0, y = 0;
            // Shadow
            g.fillStyle(0x000000, 0.3);
            g.fillEllipse(x, y + 18, 36, 12);
            // Body
            g.fillStyle(GAME_CONFIG.COLORS.PLAYER_BODY, 1);
            g.fillRoundedRect(x - 12, y - 20, 24, 28, 6);
            // Head
            g.fillStyle(0xd4a574, 1);
            g.fillCircle(x, y - 26, 10);
            // Headband
            g.fillStyle(0xf0c040, 1);
            g.fillRect(x - 10, y - 30, 20, 4);
            g.setPosition(this.playerPos.x, this.playerPos.y);
        }

        _drawDummy(d) {
            const g = d.gfx;
            g.clear();
            d.shadow.clear();
            if (d.tagged) {
                // Tagged: dim, X marks
                d.shadow.fillStyle(0x000000, 0.15);
                d.shadow.fillEllipse(d.x, d.y + 18, 36, 12);
                g.fillStyle(GAME_CONFIG.COLORS.DEFENDER_BODY, 0.25);
                g.fillRoundedRect(d.x - 12, d.y - 20, 24, 28, 6);
                g.fillStyle(0xd4a574, 0.3);
                g.fillCircle(d.x, d.y - 26, 10);
                // X indicator
                g.lineStyle(3, 0xff4422, 0.6);
                g.lineBetween(d.x - 8, d.y - 12, d.x + 8, d.y + 4);
                g.lineBetween(d.x + 8, d.y - 12, d.x - 8, d.y + 4);
            } else {
                d.shadow.fillStyle(0x000000, 0.3);
                d.shadow.fillEllipse(d.x, d.y + 18, 36, 12);
                g.fillStyle(GAME_CONFIG.COLORS.DEFENDER_BODY, 1);
                g.fillRoundedRect(d.x - 12, d.y - 20, 24, 28, 6);
                g.fillStyle(0xd4a574, 1);
                g.fillCircle(d.x, d.y - 26, 10);
                g.fillStyle(0x2070c0, 1);
                g.fillRect(d.x - 10, d.y - 30, 20, 4);
            }
        }

        _createJoysticks() {
            const r = GAME_CONFIG.JOYSTICK_RADIUS;
            this.ljBase = this.add.graphics().setDepth(100).setVisible(false).setScrollFactor(0);
            this.ljBase.lineStyle(2, 0xffffff, 0.2); this.ljBase.strokeCircle(0,0,r);
            this.ljBase.fillStyle(0xffffff, 0.05); this.ljBase.fillCircle(0,0,r);
            this.ljThumb = this.add.graphics().setDepth(101).setVisible(false).setScrollFactor(0);
            this.ljThumb.fillStyle(0xffffff, 0.3); this.ljThumb.fillCircle(0,0,28);
            this.ljThumb.lineStyle(2, 0xffffff, 0.5); this.ljThumb.strokeCircle(0,0,28);
            this.rjBase = this.add.graphics().setDepth(100).setVisible(false).setScrollFactor(0);
            this.rjBase.lineStyle(2, 0xff6644, 0.25); this.rjBase.strokeCircle(0,0,r);
            this.rjBase.fillStyle(0xff6644, 0.06); this.rjBase.fillCircle(0,0,r);
            this.rjThumb = this.add.graphics().setDepth(101).setVisible(false).setScrollFactor(0);
            this.rjThumb.fillStyle(0xff6644, 0.35); this.rjThumb.fillCircle(0,0,26);
            this.rjThumb.lineStyle(2, 0xff6644, 0.6); this.rjThumb.strokeCircle(0,0,26);
        }

        _setupTouch() {
            const s = this;
            const DZ = GAME_CONFIG.JOYSTICK_DEADZONE;
            const R = GAME_CONFIG.JOYSTICK_RADIUS;

            this.input.on('pointerdown', (p) => {
                const sx = p.x / (this.scale.displaySize.width / GAME_CONFIG.DESIGN_WIDTH);
                if (sx < GAME_CONFIG.DESIGN_WIDTH * 0.5 && !s.leftJoystickActive) {
                    s.leftJoystickActive = true; s.leftJoystickPointerID = p.id;
                    s.leftJoystickOrigin.x = p.x; s.leftJoystickOrigin.y = p.y;
                    s.ljBase.setPosition(p.x, p.y).setVisible(true);
                    s.ljThumb.setPosition(p.x, p.y).setVisible(true);
                } else if (sx >= GAME_CONFIG.DESIGN_WIDTH * 0.5 && !s.rightJoystickActive) {
                    s.rightJoystickActive = true; s.rightJoystickPointerID = p.id;
                    s.rightJoystickOrigin.x = p.x; s.rightJoystickOrigin.y = p.y;
                    s.rjBase.setPosition(p.x, p.y).setVisible(true);
                    s.rjThumb.setPosition(p.x, p.y).setVisible(true);
                }
            });

            this.input.on('pointermove', (p) => {
                if (s.leftJoystickActive && p.id === s.leftJoystickPointerID) {
                    const r = this._computeJoystick(p, s.leftJoystickOrigin);
                    s.ljThumb.setPosition(r.thumbX, r.thumbY);
                    if (r.magnitude < DZ) { s.moveVector.x = 0; s.moveVector.y = 0; }
                    else { s.moveVector.x = Math.cos(r.angle) * r.magnitude; s.moveVector.y = Math.sin(r.angle) * r.magnitude; }
                }
                if (s.rightJoystickActive && p.id === s.rightJoystickPointerID) {
                    const r = this._computeJoystick(p, s.rightJoystickOrigin);
                    s.rjThumb.setPosition(r.thumbX, r.thumbY);
                    if (r.magnitude < DZ) { s.aimVector.x = 0; s.aimVector.y = 0; }
                    else { s.aimVector.x = Math.cos(r.angle) * r.magnitude; s.aimVector.y = Math.sin(r.angle) * r.magnitude; }
                }
            });

            const up = (p) => {
                if (p.id === s.leftJoystickPointerID) {
                    s.leftJoystickActive = false; s.leftJoystickPointerID = null;
                    s.moveVector.x = 0; s.moveVector.y = 0;
                    s.ljBase.setVisible(false); s.ljThumb.setVisible(false);
                }
                if (p.id === s.rightJoystickPointerID) {
                    if (Math.abs(s.aimVector.x) > 0.1 || Math.abs(s.aimVector.y) > 0.1) s._triggerDash();
                    s.rightJoystickActive = false; s.rightJoystickPointerID = null;
                    s.aimVector.x = 0; s.aimVector.y = 0;
                    s.rjBase.setVisible(false); s.rjThumb.setVisible(false);
                }
            };
            this.input.on('pointerup', up);
            this.input.on('pointerupoutside', up);
        }

        _computeJoystick(p, o) {
            const dx = p.x - o.x, dy = p.y - o.y, d = Math.sqrt(dx*dx + dy*dy);
            const m = GAME_CONFIG.JOYSTICK_RADIUS, c = Math.min(d, m), a = Math.atan2(dy, dx);
            return { angle: a, magnitude: c / m, thumbX: o.x + Math.cos(a) * c, thumbY: o.y + Math.sin(a) * c };
        }

        _triggerDash() {
            if (this.isDashing || this.dashCooldown > 0) return;
            let dx = this.aimVector.x || this.moveVector.x;
            let dy = this.aimVector.y || this.moveVector.y;
            if (Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) dx = 1; // default right
            const m = Math.sqrt(dx*dx + dy*dy);
            this.dashDir.x = dx / m; this.dashDir.y = dy / m;
            this.isDashing = true;
            this.dashTimer = GAME_CONFIG.DASH_DURATION;
            this.dashCooldown = GAME_CONFIG.DASH_COOLDOWN;
        }

        update(time, delta) {
            const dt = delta / 1000;
            this.highlightPhase += dt * 4;

            // Keyboard input
            if (!this.leftJoystickActive) {
                let kx = 0, ky = 0;
                if (this.wasdKeys.left.isDown) kx -= 1;
                if (this.wasdKeys.right.isDown) kx += 1;
                if (this.wasdKeys.up.isDown) ky -= 1;
                if (this.wasdKeys.down.isDown) ky += 1;
                const m = Math.sqrt(kx*kx + ky*ky);
                if (m > 0) { this.moveVector.x = kx / m; this.moveVector.y = ky / m; }
                else { this.moveVector.x = 0; this.moveVector.y = 0; }
            }

            // Dash cooldown
            if (this.dashCooldown > 0) this.dashCooldown -= delta;

            // Movement / Dash
            if (this.isDashing) {
                this.dashTimer -= delta;
                if (this.dashTimer <= 0) { this.isDashing = false; }
                else {
                    this.playerPos.x += this.dashDir.x * GAME_CONFIG.DASH_SPEED * dt;
                    this.playerPos.y += this.dashDir.y * GAME_CONFIG.DASH_SPEED * dt * GAME_CONFIG.ISO_Y_SCALE;
                }
                // Check tag on dummies during dash
                this.dummies.forEach(d => {
                    if (d.tagged) return;
                    const dx = d.x - this.playerPos.x, dy = d.y - this.playerPos.y;
                    if (Math.sqrt(dx*dx + dy*dy) < GAME_CONFIG.TAG_RANGE) {
                        d.tagged = true;
                        this._drawDummy(d);
                        // Update highlight to next untagged
                        this.highlightTarget = this.dummies.find(dd => !dd.tagged) || null;
                    }
                });
            } else {
                const spd = GAME_CONFIG.PLAYER_SPEED;
                this.playerPos.x += this.moveVector.x * spd * dt;
                this.playerPos.y += this.moveVector.y * spd * dt * GAME_CONFIG.ISO_Y_SCALE;
            }

            // Clamp to court
            if (this.courtBounds) {
                this.playerPos.x = Phaser.Math.Clamp(this.playerPos.x, this.courtBounds.x, this.courtBounds.right);
                this.playerPos.y = Phaser.Math.Clamp(this.playerPos.y, this.courtBounds.y, this.courtBounds.bottom);
            }

            // Track movement for step 1
            if (Math.abs(this.moveVector.x) > 0.01 || Math.abs(this.moveVector.y) > 0.01) {
                this._moveAccum = (this._moveAccum || 0) + dt;
                if (this._moveAccum > 0.8) this._playerMoved = true;
            }

            this._drawPlayer();

            // Draw highlight ring
            this.highlightGfx.clear();
            if (this.highlightTarget) {
                const hx = this.highlightTarget.x, hy = this.highlightTarget.y;
                const pulse = 0.4 + Math.sin(this.highlightPhase) * 0.3;
                const r = 35 + Math.sin(this.highlightPhase * 0.7) * 8;
                this.highlightGfx.lineStyle(3, 0xf0c040, pulse);
                this.highlightGfx.strokeCircle(hx, hy, r);
                this.highlightGfx.lineStyle(1.5, 0xf0c040, pulse * 0.5);
                this.highlightGfx.strokeCircle(hx, hy, r + 10);
                // Arrow from player toward target
                const adx = hx - this.playerPos.x, ady = hy - this.playerPos.y;
                const ad = Math.sqrt(adx*adx + ady*ady);
                if (ad > 60) {
                    const nx = adx / ad, ny = ady / ad;
                    const ax = this.playerPos.x + nx * 40, ay = this.playerPos.y + ny * 40;
                    this.highlightGfx.lineStyle(2, 0xf0c040, 0.35);
                    this.highlightGfx.lineBetween(ax, ay, ax + nx * 20, ay + ny * 20);
                }
            }

            // Check step condition
            const step = this.steps[this.currentStep];
            if (step && step.condition()) {
                this._enterStep(this.currentStep + 1);
            }
        }
    }
    window.TutorialScene = TutorialScene;
    </script>

        // ════════════════════════════════════════════════════
        // RESET / RESTART
        // ════════════════════════════════════════════════════
        resetRaidPositions() {
            const {COURT}=GAME_CONFIG;
            const isRaider = this.turnManager.isPlayerRaider;

            // Reset formation to BOX at start of each raid
            this.currentFormation = FORMATION.BOX;
            this.formationTimer = this.diffConfig.formationSwapTime;

            // Reset raid-return tracking
            this.raiderCrossedBaulk = false;
            this.aiRaiderTagCount = 0;
            this.aiRaiderReturning = false;
            this.chainActive = false;
            this.chainCooldown = 0;
            this.bonusClaimed = false;
            this.tagsThisRaid = 0;

            // Check for Super Raid (team undermanned = fewer than 3 defenders out)
            if (isRaider) {
                const aliveDefenders = this.defendersOut.filter(d => !d).length;
                this.superRaidActive = aliveDefenders <= 2 && this.teamMembersLost > 0;
            } else {
                this.superRaidActive = false;
            }

            // Check for Do-or-Die
            if (isRaider && this.consecutiveEmptyRaids >= KABADDI_RULES.EMPTY_RAIDS_FOR_DOD) {
                this.doOrDieActive = true;
            } else {
                this.doOrDieActive = false;
            }

            // ── Player position depends on role ──
            if (isRaider) {
                this.player.setPosition(COURT.CENTER_X-200, COURT.CENTER_Y);
                this.playerLabel.setText('YOU');
                this.playerLabel.setColor('#ffffff');
                this.facingAngle = 0; // face right toward defenders
            } else {
                // Defender role: place at selected defender slot
                const formPos = FORMATION_POSITIONS[this.currentFormation](COURT.CENTER_X, COURT.CENTER_Y);
                const selIdx = this.selectedDefenderIdx || 0;
                const p = formPos[selIdx % formPos.length];
                this.player.setPosition(p.x, p.y);
                this.playerLabel.setText('YOU');
                this.playerLabel.setColor('#44ddff');
                this.facingAngle = Math.PI; // face left toward raider
            }
            this.player.setAlpha(1); this.playerState=ENTITY_STATE.IDLE;
            this.dashTimer=0; this.dashCooldownTimer=0;

            // ── Defenders (formation-aware) ──
            const formPos = FORMATION_POSITIONS[this.currentFormation](COURT.CENTER_X, COURT.CENTER_Y);
            const selIdx = this.selectedDefenderIdx || 0;
            this.defenders.forEach((def,i)=>{
                const p = formPos[i % formPos.length];
                def.container.setPosition(p.x,p.y);
                def.tackleTimer=0;def.tackleCooldownTimer=0;def.stunTimer=0;def.homeX=p.x;def.homeY=p.y;
                def._chainBoost=false;def._chainTimer=0;def.aggroRange=def._originalAggro||200;def.pursuitSpeed=def._originalSpeed||120;def._reactionTimer=0;

                if (isRaider) {
                    // Player is raiding: these are OPPONENT defenders
                    // Hide any that were tagged out in a previous raid
                    if (this.defendersOut[i]) {
                        def.state = ENTITY_STATE.OUT;
                        def.container.setAlpha(0);
                        def.container.setVisible(false);
                        def.shadow.setVisible(false);
                    } else {
                        def.state = ENTITY_STATE.IDLE;
                        def.container.setAlpha(1);
                        def.container.setVisible(true);
                        def.shadow.setVisible(true);
                    }
                } else {
                    // Player is defending: these are TEAMMATES
                    // Hide the slot the player occupies + any lost team members
                    const isPlayerSlot = i === selIdx;
                    // Lost teammates: remove from highest index down (excluding player slot)
                    const otherSlots = [0,1,2].filter(j => j !== selIdx);
                    const lostSlots = otherSlots.slice(otherSlots.length - this.teamMembersLost);
                    const isLost = lostSlots.includes(i);

                    if (isPlayerSlot || isLost) {
                        def.state = isLost ? ENTITY_STATE.OUT : ENTITY_STATE.IDLE;
                        def.container.setAlpha(0);
                        def.container.setVisible(false);
                        def.shadow.setVisible(false);
                    } else {
                        def.state = ENTITY_STATE.IDLE;
                        def.container.setAlpha(1);
                        def.container.setVisible(true);
                        def.shadow.setVisible(true);
                    }
                }
            });

            // ── AI Raider: visible only when player is defending ──
            this.aiRaider.setVisible(!isRaider);
            this.aiRaiderShadow.setVisible(!isRaider);
            this.aiRaiderGlow.setVisible(!isRaider);
            if (!isRaider) {
                this.aiRaider.setPosition(COURT.CENTER_X-200, COURT.CENTER_Y);
                this.aiRaiderState = ENTITY_STATE.IDLE;
                this.aiRaiderDashCD = 0;
            }

            this.player.setVisible(true);
            this.playerShadow.setVisible(true);
            this.playerGlowRing.setVisible(isRaider);

            this.ultimateSystem.reset();
        }

        restartMatch() {
            this.raiderScore=0;this.defenderScore=0;
            document.getElementById('hud-raider-score').textContent='0';
            document.getElementById('hud-defender-score').textContent='0';
            this.turnManager.currentTurn=1;
            // Reset all out-trackers for fresh match
            this.defendersOut = [false, false, false];
            this.teamMembersLost = 0;
            this.turnManager.startPreRaid(); this.resetRaidPositions();
        }

        // ════════════════════════════════════════════════════
        // FORMATION ROTATION (Slice 5)
        // ════════════════════════════════════════════════════
        _rotateFormation() {
            const order = [FORMATION.BOX, FORMATION.CHAIN, FORMATION.CORNER, FORMATION.BONUS_LINE];
            const idx = order.indexOf(this.currentFormation);
            this.currentFormation = order[(idx + 1) % order.length];

            const {COURT} = GAME_CONFIG;
            const cx = COURT.CENTER_X, cy = COURT.CENTER_Y;
            const positions = FORMATION_POSITIONS[this.currentFormation](cx, cy);

            this.defenders.forEach((def, i) => {
                const p = positions[i % positions.length];
                if (p) {
                    def.homeX = p.x;
                    def.homeY = p.y;
                }
            });
        }
