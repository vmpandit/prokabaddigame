<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Kabaddi Championship</title>

    <!-- ============================================================
         VERTICAL SLICE 4 — Sound + Environments + Side-Switching
         Agent Architect: Side-switching FSM, environment state
         Agent Physics: AI Raider, player-controlled defender
         Agent VFX: Ancient courtyard env, torch particles
         Agent UI/Haptics: Web Audio synthesized SFX + ambience
         ============================================================ -->

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden; background: #0a0a12;
            overscroll-behavior: none; touch-action: none;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { max-width: 100vw !important; max-height: 100vh !important; }

        /* Portrait mode warning for mobile */
        #rotate-prompt {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: #0a0a12; color: #f0c040;
            flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif; text-align: center;
        }
        #rotate-prompt .icon { font-size: 48px; margin-bottom: 16px; animation: rotateHint 2s ease-in-out infinite; }
        #rotate-prompt p { font-size: 16px; letter-spacing: 2px; }
        #rotate-prompt .dismiss { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.4); cursor: pointer; text-decoration: underline; }
        @keyframes rotateHint { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }
        @media (orientation: portrait) and (max-width: 768px) {
            #rotate-prompt { display: flex; }
        }

        #loading-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(10,10,18,0.85); backdrop-filter: blur(12px); transition: opacity 0.6s ease;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        #loading-overlay h1 { font-size: 1.8rem; font-weight: 700; color: #f0c040; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1rem; text-shadow: 0 0 20px rgba(240,192,64,0.4); }
        #loading-overlay .subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.5); letter-spacing: 0.3em; text-transform: uppercase; }
        .spinner { width: 48px; height: 48px; border: 3px solid rgba(240,192,64,0.2); border-top-color: #f0c040; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #hud-overlay { position: fixed; top: 0; left: 0; right: 0; z-index: 50; pointer-events: none; padding: 8px 12px; display: flex; justify-content: space-between; align-items: flex-start; }
        .hud-panel { background: rgba(10,10,18,0.65); backdrop-filter: blur(8px); border: 1px solid rgba(240,192,64,0.15); border-radius: 8px; padding: 6px 12px; color: rgba(255,255,255,0.8); font-size: 13px; }
        .hud-panel .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(240,192,64,0.6); margin-bottom: 1px; }
        .hud-panel .value { font-size: 16px; font-weight: 700; }
        .score-raider { color: #e85030; }
        .score-defender { color: #3090e8; }
        #hud-center { text-align: center; min-width: 160px; }
        #hud-timer { font-size: 22px; font-weight: 700; color: #f0c040; font-variant-numeric: tabular-nums; }
        #hud-turn { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }
        #skill-meter-wrap { margin-top: 5px; width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
        #skill-meter-fill { height: 100%; width: 0%; border-radius: 3px; background: linear-gradient(90deg, #f0c040, #ff6644); transition: width 0.3s ease; }
        #skill-meter-fill.full { background: linear-gradient(90deg, #ff4422, #f0c040, #ff4422); animation: meterPulse 0.6s ease infinite; }
        @keyframes meterPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        #ult-ready-badge { display: none; font-size: 9px; color: #f0c040; font-weight: 700; letter-spacing: 0.1em; margin-top: 2px; text-transform: uppercase; animation: ultBadgePulse 0.8s ease infinite; }
        #ult-ready-badge.show { display: block; }
        @keyframes ultBadgePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ── Role Badge (Slice 4) ── */
        #hud-role { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; padding: 2px 8px; border-radius: 4px; display: inline-block; }
        #hud-role.raider { background: rgba(232,80,48,0.2); color: #e85030; }
        #hud-role.defender { background: rgba(48,144,232,0.2); color: #3090e8; }

        /* ── Sound Toggle (Slice 4) ── */
        #sound-toggle { position: fixed; bottom: 10px; right: 10px; z-index: 55; pointer-events: auto; background: rgba(10,10,18,0.6); backdrop-filter: blur(6px); border: 1px solid rgba(240,192,64,0.2); border-radius: 6px; color: rgba(255,255,255,0.5); font-size: 11px; padding: 4px 10px; cursor: pointer; font-family: inherit; }
        #sound-toggle:hover { color: #f0c040; border-color: rgba(240,192,64,0.4); }

        /* ── Env Label (Slice 4) ── */
        #env-label { position: fixed; bottom: 10px; left: 10px; z-index: 55; pointer-events: none; font-size: 10px; color: rgba(240,192,64,0.2); letter-spacing: 0.2em; text-transform: uppercase; }

        #turn-banner { position: fixed; inset: 0; z-index: 70; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,18,0.75); backdrop-filter: blur(6px); opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #turn-banner.show { opacity: 1; pointer-events: auto; }
        #turn-banner h2 { font-size: 2rem; font-weight: 700; color: #f0c040; text-transform: uppercase; letter-spacing: 0.2em; }
        #turn-banner p { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-top: 8px; }
        #impact-flash { position: fixed; inset: 0; z-index: 60; background: white; opacity: 0; pointer-events: none; transition: opacity 0.05s ease; }
    </style>
</head>
<body>
    <div id="rotate-prompt">
        <div class="icon">&#x1F4F1;</div>
        <p>ROTATE YOUR DEVICE</p>
        <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:8px;">This game is best played in landscape</p>

    </div>
    <div id="loading-overlay"><div class="spinner"></div><h1>Pro Kabaddi</h1><div class="subtitle">Championship</div></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

         ================================================================ -->
    <script>

    window.GAME_CONFIG = GAME_CONFIG;

    window.GAME_PHASE = GAME_PHASE;

    const ENTITY_STATE = { IDLE:'idle', MOVING:'moving', DASHING:'dashing', TACKLING:'tackling', STUNNED:'stunned', TAGGED:'tagged', OUT:'out', ULTIMATE:'ultimate' };
    window.ENTITY_STATE = ENTITY_STATE;

    const PLAYER_ROLE = { RAIDER: 'raider', DEFENDER: 'defender' };
    window.PLAYER_ROLE = PLAYER_ROLE;

    // ════════════════════════════════════════════════════
    // SLICE 7 — Kabaddi Rules Constants
    // ════════════════════════════════════════════════════

    // ════════════════════════════════════════════════════

    // ════════════════════════════════════════════════════

    const COMBO_CONFIG = {

        normal: { speedMult: 1.0, reactionDelay: 300, tackleAccuracy: 0.8, aggroMult: 0.7, formationSwapTime: 12000, label: 'NORMAL' },
        hard:   { speedMult: 1.2, reactionDelay: 150, tackleAccuracy: 0.92, aggroMult: 0.85, formationSwapTime: 6000, label: 'HARD' },
        extreme:{ speedMult: 1.4, reactionDelay: 60,  tackleAccuracy: 0.98, aggroMult: 0.95, formationSwapTime: 3000, label: 'EXTREME' },
    };

    // Defender formations
    const FORMATION = {
        BOX: 'box',
        CHAIN: 'chain',
        CORNER: 'corner',

    };
    window.FORMATION = FORMATION;

    const FORMATION_POSITIONS = {
        box: (cx,cy) => [
            { x: cx+160, y: cy-100, role: 'corner' },

    <!-- ================================================================
         AGENT UI/HAPTICS — SoundEngine (Slice 4)
         Procedural Web Audio API: cant drone, impacts, crowd, footsteps.
         Zero external files — everything is synthesized.
         ================================================================ -->
    <script>
    class SoundEngine {
        constructor() {
            this.ctx = null;          // AudioContext — created on first user gesture
            this.masterGain = null;
            this.enabled = false;
            this.initialized = false;

            // Ambient nodes
            this.crowdNode = null;
            this.cantNode = null;
            this.cantGain = null;
        }

        /** Initialize AudioContext (must be called from user gesture) */
        init() {
            if (this.initialized) return;
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.4;
                this.masterGain.connect(this.ctx.destination);
                this.initialized = true;
            } catch(e) { console.warn('Web Audio not available'); }
        }

        toggle() {
            if (!this.initialized) this.init();
            this.enabled = !this.enabled;
            document.getElementById('sound-toggle').textContent = `Sound: ${this.enabled ? 'ON' : 'OFF'}`;
            if (this.enabled) {
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.startCrowdAmbience();
            } else {
                this.stopAll();
            }
        }

        // ──────────────────────────────────────────────────
        // CROWD AMBIENCE (Agent UI/Haptics)
        // Brown noise filtered to sound like distant crowd murmur.
        // ──────────────────────────────────────────────────
        startCrowdAmbience() {
            if (!this.enabled || !this.initialized || this.crowdNode) return;

            const bufferSize = 2 * this.ctx.sampleRate;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);

            // Generate brown noise
            let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                data[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = data[i];
                data[i] *= 3.5;
            }

            this.crowdNode = this.ctx.createBufferSource();
            this.crowdNode.buffer = buffer;
            this.crowdNode.loop = true;

            // Bandpass filter for crowd-like frequency range
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 400;
            filter.Q.value = 0.8;

            const gain = this.ctx.createGain();
            gain.gain.value = 0.12;

            this.crowdNode.connect(filter);
            filter.connect(gain);
            gain.connect(this.masterGain);
            this.crowdNode.start();
        }

        // ──────────────────────────────────────────────────
        // CANT CHANT (Agent UI/Haptics)
        // Low oscillating drone that pulses like "Ka-bad-di".
        // Uses two detuned oscillators with amplitude modulation.
        // ──────────────────────────────────────────────────
        startCant() {
            if (!this.enabled || !this.initialized) return;
            this.stopCant();

            // Base drone — low hum
            const osc1 = this.ctx.createOscillator();
            osc1.type = 'sawtooth';
            osc1.frequency.value = 110; // Low A

            const osc2 = this.ctx.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.value = 112; // slight detune for richness

            // Amplitude modulation (the "Ka-BAD-di" rhythm)
            const lfo = this.ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 2.5; // ~2.5 syllables/sec ≈ "Ka-bad-di"

            const lfoGain = this.ctx.createGain();
            lfoGain.gain.value = 0.3;

            this.cantGain = this.ctx.createGain();
            this.cantGain.gain.value = 0.08;

            // Lowpass to soften
            const lpf = this.ctx.createBiquadFilter();
            lpf.type = 'lowpass';
            lpf.frequency.value = 300;

            lfo.connect(lfoGain);
            lfoGain.connect(this.cantGain.gain);

            osc1.connect(lpf);
            osc2.connect(lpf);
            lpf.connect(this.cantGain);
            this.cantGain.connect(this.masterGain);

            osc1.start(); osc2.start(); lfo.start();

            this.cantNode = { osc1, osc2, lfo };
        }

        /** Adjust cant volume based on remaining breath ratio (0..1) */
        setCantIntensity(ratio) {
            if (!this.cantGain) return;
            // Gets louder and more urgent as time runs out
            const vol = 0.05 + (1 - ratio) * 0.15;
            this.cantGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.1);

            // Speed up the LFO as breath runs out
            if (this.cantNode && this.cantNode.lfo) {
                const speed = 2.5 + (1 - ratio) * 3; // 2.5 → 5.5 Hz
                this.cantNode.lfo.frequency.setTargetAtTime(speed, this.ctx.currentTime, 0.2);
            }
        }

        stopCant() {
            if (this.cantNode) {
                try { this.cantNode.osc1.stop(); this.cantNode.osc2.stop(); this.cantNode.lfo.stop(); } catch(e) {}
                this.cantNode = null; this.cantGain = null;
            }
        }

        // ──────────────────────────────────────────────────
        // IMPACT SFX (Agent UI/Haptics)
        // Short percussive hit — sine burst with pitch sweep.
        // ──────────────────────────────────────────────────
        playImpact(intensity = 1) {
            if (!this.enabled || !this.initialized) return;
            const t = this.ctx.currentTime;

            const osc = this.ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200 * intensity, t);
            osc.frequency.exponentialRampToValueAtTime(50, t + 0.15);

            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0.4 * intensity, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);

            // Noise burst layer
            const noiseLen = 0.08;
            const noiseBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * noiseLen, this.ctx.sampleRate);
            const nd = noiseBuf.getChannelData(0);
            for (let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1) * 0.5;
            const noiseSrc = this.ctx.createBufferSource();
            noiseSrc.buffer = noiseBuf;
            const noiseGain = this.ctx.createGain();
            noiseGain.gain.setValueAtTime(0.25 * intensity, t);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);

            osc.connect(gain); gain.connect(this.masterGain);
            noiseSrc.connect(noiseGain); noiseGain.connect(this.masterGain);
            osc.start(t); osc.stop(t + 0.2);
            noiseSrc.start(t); noiseSrc.stop(t + noiseLen);
        }

        // ──────────────────────────────────────────────────
        // DASH WHOOSH (Agent UI/Haptics)
        // Filtered noise sweep for dash movement.
        // ──────────────────────────────────────────────────
        playDash() {
            if (!this.enabled || !this.initialized) return;
            const t = this.ctx.currentTime;
            const len = 0.15;
            const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * len, this.ctx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1);
            const src = this.ctx.createBufferSource();
            src.buffer = buf;

            const bpf = this.ctx.createBiquadFilter();
            bpf.type = 'bandpass';
            bpf.frequency.setValueAtTime(2000, t);
            bpf.frequency.exponentialRampToValueAtTime(500, t + len);
            bpf.Q.value = 2;

            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + len);

            src.connect(bpf); bpf.connect(gain); gain.connect(this.masterGain);
            src.start(t); src.stop(t + len);
        }

        // ──────────────────────────────────────────────────
        // ULTIMATE ACTIVATION CHIME (Agent UI/Haptics)
        // Rising arpeggio of sine tones.
        // ──────────────────────────────────────────────────
        playUltimate() {
            if (!this.enabled || !this.initialized) return;
            const t = this.ctx.currentTime;
            const notes = [330, 440, 550, 660, 880]; // E4 → A5

            notes.forEach((freq, i) => {
                const osc = this.ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                const g = this.ctx.createGain();
                const start = t + i * 0.06;
                g.gain.setValueAtTime(0, start);
                g.gain.linearRampToValueAtTime(0.12, start + 0.03);
                g.gain.exponentialRampToValueAtTime(0.001, start + 0.3);
                osc.connect(g); g.connect(this.masterGain);
                osc.start(start); osc.stop(start + 0.3);
            });
        }

        // ──────────────────────────────────────────────────
        // TURN CHIME (Agent UI/Haptics)
        // Two-note bell for phase transitions.
        // ──────────────────────────────────────────────────
        playTurnChime() {
            if (!this.enabled || !this.initialized) return;
            const t = this.ctx.currentTime;
            [523, 659].forEach((freq, i) => { // C5, E5
                const osc = this.ctx.createOscillator();
                osc.type = 'sine'; osc.frequency.value = freq;
                const g = this.ctx.createGain();
                g.gain.setValueAtTime(0.15, t + i*0.12);
                g.gain.exponentialRampToValueAtTime(0.001, t + i*0.12 + 0.4);
                osc.connect(g); g.connect(this.masterGain);
                osc.start(t + i*0.12); osc.stop(t + i*0.12 + 0.4);
            });
        }

        // ──────────────────────────────────────────────────
        // FOOTSTEP TICK (Agent UI/Haptics)
        // Subtle click for movement feedback.
        // ──────────────────────────────────────────────────
        playFootstep() {
            if (!this.enabled || !this.initialized) return;
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            osc.type = 'sine'; osc.frequency.value = 80;
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0.04, t);
            g.gain.exponentialRampToValueAtTime(0.001, t+0.04);
            osc.connect(g); g.connect(this.masterGain);
            osc.start(t); osc.stop(t+0.04);
        }

        stopAll() {
            this.stopCant();
            if (this.crowdNode) { try { this.crowdNode.stop(); } catch(e) {} this.crowdNode = null; }
        }
    }
    window.SoundEngine = new SoundEngine();
    </script>

    <script>
    class HapticsManager {
        constructor() { this.supported = !!(navigator && navigator.vibrate); }
        light()    { if (this.supported) navigator.vibrate(GAME_CONFIG.HAPTIC_LIGHT); }
        heavy()    { if (this.supported) navigator.vibrate(GAME_CONFIG.HAPTIC_HEAVY); }
        dash()     { if (this.supported) navigator.vibrate(GAME_CONFIG.HAPTIC_DASH); }
