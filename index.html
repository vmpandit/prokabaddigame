    <!-- ================================================================
         AGENT VFX — VFXManager (Slice 4 — + torch particles, env art)
         ================================================================ -->
    <script>
    class VFXManager {
        constructor(scene) {
            this.scene = scene;
            this.hitStopActive = false;
            this.flashEl = document.getElementById('impact-flash');
            this.auraParticles = [];
            this.auraActive = false;
            this.auraPhase = 0;
            this.torchParticles = [];
        }

        triggerHitStop(dur = GAME_CONFIG.HITSTOP_DURATION) {
            if (this.hitStopActive) return;
            this.hitStopActive = true;
            this.scene.time.timeScale = GAME_CONFIG.HITSTOP_TIMESCALE;
            this.scene.tweens.timeScale = GAME_CONFIG.HITSTOP_TIMESCALE;
            setTimeout(() => { this.scene.time.timeScale=1; this.scene.tweens.timeScale=1; this.hitStopActive=false; }, dur);
        }
        triggerShake(i=GAME_CONFIG.SHAKE_INTENSITY,d=GAME_CONFIG.SHAKE_DURATION) { this.scene.cameras.main.shake(d,i); }
        triggerFlash(d=80) {
            if(!this.flashEl) return;
            this.flashEl.style.opacity='0.5';
            this.flashEl.style.background = 'radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%)';
            setTimeout(()=>{this.flashEl.style.opacity='0';},d);
        }

        // ══════════════════════════════════════════════════
        // UPGRADED IMPACT RING — Layered with glow core
        // ══════════════════════════════════════════════════
        spawnImpactRing(x,y,color=GAME_CONFIG.COLORS.IMPACT_RING) {
            // Layer 1: Outer soft glow ring
            const glowRing = this.scene.add.graphics().setDepth(49);
            let gr = 8, ga = 0.5;
            this.scene.time.addEvent({delay:16,repeat:20,callback:()=>{
                glowRing.clear(); gr+=5; ga-=0.025;
                if(ga<=0){glowRing.destroy();return;}
                glowRing.lineStyle(6,color,ga*0.3);
                glowRing.strokeEllipse(x,y,gr*2,gr*0.7);
            }});

            // Layer 2: Sharp inner ring
            const ring = this.scene.add.graphics().setDepth(50);
            let r = 5, a = 1.0;
            this.scene.time.addEvent({delay:16,repeat:18,callback:()=>{
                ring.clear(); r+=4; a-=0.055;
                if(a<=0){ring.destroy();return;}
                ring.lineStyle(2.5,color,a);
                ring.strokeEllipse(x,y,r*2,r*0.7);
                // Inner bright core
                ring.lineStyle(1,0xffffff,a*0.6);
                ring.strokeEllipse(x,y,r*1.4,r*0.5);
            }});

            // Layer 3: Central flash dot
            const dot = this.scene.add.graphics().setDepth(51);
            dot.fillStyle(0xffffff, 0.9);
            dot.fillCircle(x, y, 8);
            dot.fillStyle(color, 0.4);
            dot.fillCircle(x, y, 14);
            this.scene.tweens.add({targets:dot, alpha:0, duration:200, ease:'Quad.easeOut', onComplete:()=>dot.destroy()});
        }

        // ══════════════════════════════════════════════════
        // DIRECTIONAL TRAIL — Dash = stretched diamond, Tackle = arc wedge
        // ══════════════════════════════════════════════════
        spawnTrailStamp(x, y, color, dirX = 0, dirY = 0, isDash = true) {
            const s = this.scene.add.graphics().setDepth(8);

            if (isDash && (Math.abs(dirX) > 0.01 || Math.abs(dirY) > 0.01)) {
                // Stretched diamond in movement direction
                const len = 22, wid = 8;
                const angle = Math.atan2(dirY, dirX);
                const cos = Math.cos(angle), sin = Math.sin(angle);
                const isoScale = GAME_CONFIG.ISO_Y_SCALE;

                // Diamond points: front tip, left, back, right
                const fx = x + cos * len, fy = y + sin * len * isoScale;
                const bx = x - cos * len * 0.5, by = y - sin * len * 0.5 * isoScale;
                const lx = x - sin * wid, ly = y + cos * wid * isoScale;
                const rx = x + sin * wid, ry = y - cos * wid * isoScale;

                // Glow layer
                s.fillStyle(color, 0.15);
                s.fillTriangle(fx, fy, lx - sin * 3, ly + cos * 3, rx + sin * 3, ry - cos * 3);
                s.fillTriangle(bx, by, lx - sin * 3, ly + cos * 3, rx + sin * 3, ry - cos * 3);

                // Core diamond
                s.fillStyle(color, 0.45);
                s.fillTriangle(fx, fy, lx, ly, rx, ry);
                s.fillTriangle(bx, by, lx, ly, rx, ry);

                // Bright center line
                s.lineStyle(1.5, 0xffffff, 0.3);
                s.lineBetween(bx, by, fx, fy);
            } else {
                // Fallback: soft elliptical stamp
                s.fillStyle(color, 0.12);
                s.fillEllipse(x, y, 24, 32);
                s.fillStyle(color, 0.35);
                s.fillEllipse(x, y, 14, 20);
            }

            this.scene.tweens.add({targets:s, alpha:0, duration:300, ease:'Quad.easeOut', onComplete:()=>s.destroy()});
        }

        // ══════════════════════════════════════════════════
        // TACKLE ARC WEDGE — Fan-shaped sweep effect
        // ══════════════════════════════════════════════════
        spawnTackleArc(x, y, dirX, dirY, color = GAME_CONFIG.COLORS.TACKLE_AIM) {
            const arc = this.scene.add.graphics().setDepth(50);
            const angle = Math.atan2(dirY, dirX);
            const spread = 0.6; // radians on each side
            let radius = 20, alpha = 0.7;

            this.scene.time.addEvent({delay:16, repeat:14, callback:()=>{
                arc.clear(); radius += 6; alpha -= 0.048;
                if (alpha <= 0) { arc.destroy(); return; }

                // Draw arc wedge as filled triangle fan
                const steps = 8;
                const iso = GAME_CONFIG.ISO_Y_SCALE;
                for (let i = 0; i < steps; i++) {
                    const a0 = angle - spread + (spread * 2 / steps) * i;
                    const a1 = angle - spread + (spread * 2 / steps) * (i + 1);

                    arc.fillStyle(color, alpha * 0.3);
                    arc.fillTriangle(
                        x, y,
                        x + Math.cos(a0) * radius, y + Math.sin(a0) * radius * iso,
                        x + Math.cos(a1) * radius, y + Math.sin(a1) * radius * iso
                    );

                    // Edge lines
                    arc.lineStyle(1.5, color, alpha * 0.7);
                    arc.lineBetween(
                        x + Math.cos(a0) * radius * 0.8, y + Math.sin(a0) * radius * 0.8 * iso,
                        x + Math.cos(a1) * radius * 0.8, y + Math.sin(a1) * radius * 0.8 * iso
                    );
                }

                // Bright edge highlight
                arc.lineStyle(2, 0xffffff, alpha * 0.25);
                arc.lineBetween(
                    x + Math.cos(angle - spread) * radius, y + Math.sin(angle - spread) * radius * iso,
                    x + Math.cos(angle + spread) * radius, y + Math.sin(angle + spread) * radius * iso
                );
            }});
        }

        triggerFullImpact(x, y, color) {
            this.triggerHitStop(); this.triggerShake(); this.triggerFlash();
            this.spawnImpactRing(x, y, color);

            // Debris particles (4-6 small shards flying outward)
            const shardCount = 5;
            for (let i = 0; i < shardCount; i++) {
                const shard = this.scene.add.graphics().setDepth(51);
                const angle = (Math.PI * 2 / shardCount) * i + Math.random() * 0.5;
                const speed = 80 + Math.random() * 60;
                const size = 2 + Math.random() * 3;
                let sx = x, sy = y, sa = 0.8;

                shard.fillStyle(color, sa);
                shard.fillRect(-size/2, -size/2, size, size);
                shard.setPosition(sx, sy);

                this.scene.time.addEvent({delay:16, repeat:12, callback:()=>{
                    sx += Math.cos(angle) * speed * 0.016;
                    sy += Math.sin(angle) * speed * 0.016 * GAME_CONFIG.ISO_Y_SCALE;
                    sa -= 0.065;
                    if (sa <= 0) { shard.destroy(); return; }
                    shard.clear();
                    shard.fillStyle(color, sa);
                    shard.fillRect(-size/2, -size/2, size, size);
                    shard.fillStyle(0xffffff, sa * 0.4);
                    shard.fillRect(-size/4, -size/4, size/2, size/2);
                    shard.setPosition(sx, sy);
                }});
            }

            window.HapticsManager.heavy();
            window.SoundEngine.playImpact(1.2);
        }

        // ── Aura System (upgraded with inner/outer layers) ──
        startAura(x, y, color) {
            this.stopAura(); this.auraActive = true; this.auraPhase = 0;
            const count = GAME_CONFIG.AURA_PARTICLE_COUNT;
            for (let i = 0; i < count; i++) {
                const p = this.scene.add.graphics().setDepth(9);
                const isInner = i < count / 2;
                this.auraParticles.push({
                    gfx: p,
                    angle: (Math.PI * 2 / count) * i,
                    radiusOffset: isInner ? Math.random() * 6 : 8 + Math.random() * 12,
                    speedMult: isInner ? 1.2 + Math.random() * 0.4 : 0.6 + Math.random() * 0.5,
                    size: isInner ? 1.5 + Math.random() * 2 : 2.5 + Math.random() * 3.5,
                    color, isInner
                });
            }
            this.triggerFlash(50); this.triggerShake(0.008, 150);
        }

        updateAura(x, y, dt) {
            if (!this.auraActive) return;
            this.auraPhase += dt * 4;
            this.auraParticles.forEach(p => {
                p.gfx.clear();
                const baseR = p.isInner ? GAME_CONFIG.AURA_RADIUS * 0.5 : GAME_CONFIG.AURA_RADIUS;
                const r = baseR + p.radiusOffset + Math.sin(this.auraPhase * p.speedMult) * 8;
                const a = p.angle + this.auraPhase * p.speedMult * 0.5;
                const px = x + Math.cos(a) * r, py = y + 10 + Math.sin(a) * r * 0.4;
                const fl = 0.4 + Math.sin(this.auraPhase * 3 + p.angle) * 0.3;

                // Outer glow
                p.gfx.fillStyle(p.color, fl * 0.12);
                p.gfx.fillCircle(px, py, p.size * 3);
                // Core
                p.gfx.fillStyle(p.color, fl);
                p.gfx.fillCircle(px, py, p.size);
                // Hot center
                if (p.isInner) {
                    p.gfx.fillStyle(0xffffff, fl * 0.4);
                    p.gfx.fillCircle(px, py, p.size * 0.5);
                }
            });
        }

        stopAura() { this.auraActive = false; this.auraParticles.forEach(p => p.gfx.destroy()); this.auraParticles = []; }

        // ══════════════════════════════════════════════════
        // UPGRADED ULTIMATE BURST — Shockwave + radial rays + sparkle ring
        // ══════════════════════════════════════════════════
        spawnUltBurst(x, y, color) {
            // 3 staggered shockwave rings
            for (let i = 0; i < 3; i++) {
                const ring = this.scene.add.graphics().setDepth(50);
                let r = 10 + i * 5, a = 0.9 - i * 0.15;
                const delay = i * 50;
                this.scene.time.delayedCall(delay, () => {
                    this.scene.time.addEvent({delay:16, repeat:24, callback:()=>{
                        ring.clear(); r += 5; a -= 0.037;
                        if (a <= 0) { ring.destroy(); return; }
                        // Outer glow
                        ring.lineStyle(5 - i, color, a * 0.2);
                        ring.strokeEllipse(x, y, r * 2 + 4, (r + 2) * 0.7);
                        // Sharp ring
                        ring.lineStyle(2.5 - i * 0.5, color, a);
                        ring.strokeEllipse(x, y, r * 2, r * 0.7);
                        // White inner ring
                        ring.lineStyle(1, 0xffffff, a * 0.4);
                        ring.strokeEllipse(x, y, r * 1.6, r * 0.56);
                    }});
                });
            }

            // Radial rays with tapered ends
            const bg = this.scene.add.graphics().setDepth(49);
            const rays = 16; let ba = 0.8, bl = 20;
            this.scene.time.addEvent({delay:16, repeat:18, callback:()=>{
                bg.clear(); bl += 5; ba -= 0.044;
                if (ba <= 0) { bg.destroy(); return; }
                for (let r = 0; r < rays; r++) {
                    const an = (Math.PI * 2 / rays) * r;
                    const iso = 0.45;
                    // Ray body
                    bg.lineStyle(2, color, ba * 0.6);
                    bg.lineBetween(x + Math.cos(an) * 15, y + Math.sin(an) * 15 * iso,
                                   x + Math.cos(an) * bl, y + Math.sin(an) * bl * iso);
                    // Ray tip dot
                    bg.fillStyle(0xffffff, ba * 0.3);
                    bg.fillCircle(x + Math.cos(an) * bl, y + Math.sin(an) * bl * iso, 1.5);
                }
            }});

            // Central flash
            const flash = this.scene.add.graphics().setDepth(52);
            flash.fillStyle(0xffffff, 0.7);
            flash.fillCircle(x, y, 12);
            flash.fillStyle(color, 0.3);
            flash.fillCircle(x, y, 24);
            this.scene.tweens.add({targets: flash, alpha: 0, duration: 300, onComplete:()=>flash.destroy()});
        }

        // ── Cant Ring (upgraded with glow) ──
        drawCantRing(gfx, x, y, timeRatio, phase) {
            gfx.clear();
            if (timeRatio <= 0) return;
            const segs = 16, active = Math.ceil(segs * timeRatio), br = 44;
            const warn = timeRatio < (GAME_CONFIG.CANT_WARNING / GAME_CONFIG.CANT_DURATION);
            const color = warn ? GAME_CONFIG.COLORS.CANT_WARNING : GAME_CONFIG.COLORS.CANT_RING;

            // Ambient underglow
            gfx.fillStyle(color, (warn ? 0.08 : 0.04) + Math.sin(phase * 3) * 0.02);
            gfx.fillEllipse(x, y + 24, br * 2.2, br * 0.85);

            for (let i = 0; i < segs; i++) {
                if (i >= active) continue;
                const sa = (Math.PI * 2 / segs) * i - Math.PI / 2;
                const ea = sa + (Math.PI * 2 / segs) * 0.75;
                const ps = 1 + Math.sin(phase * 4 + i * 0.5) * 0.08;
                const r = br * ps, iry = r * 0.38;
                let al = 0.55;
                if (i / segs > timeRatio - 0.15) al = 0.2 + Math.sin(phase * 6) * 0.2;
                if (warn) al = 0.35 + Math.sin(phase * 8) * 0.35;

                for (let s = 0; s < 4; s++) {
                    const t0 = sa + (ea - sa) * (s / 4), t1 = sa + (ea - sa) * ((s + 1) / 4);
                    // Glow layer
                    gfx.lineStyle(warn ? 5 : 4, color, al * 0.15);
                    gfx.lineBetween(x + Math.cos(t0) * r, y + 24 + Math.sin(t0) * iry,
                                    x + Math.cos(t1) * r, y + 24 + Math.sin(t1) * iry);
                    // Sharp layer
                    gfx.lineStyle(warn ? 2.5 : 2, color, al);
                    gfx.lineBetween(x + Math.cos(t0) * r, y + 24 + Math.sin(t0) * iry,
                                    x + Math.cos(t1) * r, y + 24 + Math.sin(t1) * iry);
                }
            }
            // Center pulse
            const cp = 0.5 + Math.sin(phase * 5) * 0.4;
            gfx.fillStyle(color, cp * 0.15);
            gfx.fillCircle(x, y + 24, 8 + Math.sin(phase * 5) * 3);
            gfx.fillStyle(color, cp * 0.4);
            gfx.fillCircle(x, y + 24, 4 + Math.sin(phase * 5) * 2);
        }

        // ══════════════════════════════════════════════════
        // TORCH PARTICLES (upgraded — multi-layer flame)
        // ══════════════════════════════════════════════════
        initTorchParticles(positions) {
            this.destroyTorchParticles();
            positions.forEach(pos => {
                const gfx = this.scene.add.graphics().setDepth(3);
                this.torchParticles.push({
                    gfx, x: pos.x, y: pos.y,
                    phase: Math.random() * Math.PI * 2,
                    sparks: [{dy:0,dx:0,a:1},{dy:0,dx:0,a:1},{dy:0,dx:0,a:1}]
                });
            });
        }

        updateTorchParticles(dt) {
            this.torchParticles.forEach(t => {
                t.phase += dt * (5 + Math.random());
                t.gfx.clear();

                const flicker = 0.5 + Math.sin(t.phase) * 0.3;

                // Ground glow (ambient light pool)
                t.gfx.fillStyle(GAME_CONFIG.COLORS.TORCH_GLOW, flicker * 0.06);
                t.gfx.fillEllipse(t.x, t.y + 12, 50, 20);

                // Outer glow halo
                t.gfx.fillStyle(GAME_CONFIG.COLORS.TORCH_GLOW, flicker * 0.12);
                t.gfx.fillCircle(t.x, t.y, 20 + Math.sin(t.phase * 0.7) * 4);

                // Mid flame
                t.gfx.fillStyle(0xffaa22, flicker * 0.7);
                t.gfx.fillCircle(t.x, t.y - 2, 6 + Math.sin(t.phase * 1.3) * 2);

                // Flame core (bright)
                const fsize = 3.5 + Math.sin(t.phase * 1.5) * 1;
                t.gfx.fillStyle(0xffdd66, flicker);
                t.gfx.fillCircle(t.x, t.y - 1, fsize);

                // Hot center
                t.gfx.fillStyle(0xffffff, flicker * 0.4);
                t.gfx.fillCircle(t.x, t.y, 2);

                // Rising sparks (3 per torch, staggered)
                t.sparks.forEach((sp, si) => {
                    sp.dy -= dt * 25;
                    sp.dx = Math.sin(t.phase * 2 + si * 2) * 0.5;
                    sp.a -= dt * 0.5;
                    if (sp.a <= 0) { sp.dy = 0; sp.dx = 0; sp.a = 0.6 + Math.random() * 0.3; }
                    const sparkY = t.y + sp.dy;
                    t.gfx.fillStyle(0xffcc44, sp.a * 0.6);
                    t.gfx.fillCircle(t.x + sp.dx * 4 + si * 2 - 2, sparkY, 1.2);
                });
            });
        }

        destroyTorchParticles() {
            this.torchParticles.forEach(t => t.gfx.destroy());
            this.torchParticles = [];
        }
    }
    window.VFXManager = VFXManager;
    </script>

    <!-- ================================================================
         AGENT ARCHITECT — TurnManager (Slice 4 — side-switching)
         ================================================================ -->
    <script>
    class TurnManager {
        constructor(scene) {
            this.scene = scene;
            this.phase = GAME_PHASE.PRE_RAID;
            this.currentTurn = 1;
            this.maxTurns = GAME_CONFIG.TURN_COUNT;
            this.cantTimeRemaining = GAME_CONFIG.CANT_DURATION;
            this.cantTimeMax = GAME_CONFIG.CANT_DURATION;
            this.phaseTimer = 0;

            // Side-switching (Slice 4): odd turns = raider, even = defender
            this.playerRole = PLAYER_ROLE.RAIDER;

            this.timerEl = document.getElementById('hud-timer');
            this.turnEl = document.getElementById('hud-turn');
            this.roleEl = document.getElementById('hud-role');
            this.bannerEl = document.getElementById('turn-banner');
            this.bannerTitle = document.getElementById('banner-title');
            this.bannerSub = document.getElementById('banner-sub');
        }

        /** Odd turns = player raids, even turns = player defends */
        computeRole() {
            this.playerRole = (this.currentTurn % 2 === 1) ? PLAYER_ROLE.RAIDER : PLAYER_ROLE.DEFENDER;
        }

        startPreRaid() {
            this.phase = GAME_PHASE.PRE_RAID;
            this.cantTimeRemaining = this.cantTimeMax;
            this.computeRole();

            const isRaider = this.playerRole === PLAYER_ROLE.RAIDER;

            if (isRaider) {
                // Raider turn: standard countdown then go
                this.phaseTimer = GAME_CONFIG.PHASE_PRE_RAID_TIME;
                this.bannerTitle.textContent = `RAID ${this.currentTurn}`;
                // Super Raid / Do-or-Die annotations
                let subText = 'You are the RAIDER — dash in, tag defenders, get back safe!';
                if (this.scene.superRaidActive) {
                    subText = 'SUPER RAID! Your team is undermanned — tags worth DOUBLE!';
                    this.bannerTitle.textContent = `SUPER RAID ${this.currentTurn}`;
                }
                if (this.scene.doOrDieActive) {
                    subText = 'DO-OR-DIE! You MUST score or lose a point!';
                    this.bannerTitle.textContent = `DO-OR-DIE RAID ${this.currentTurn}`;
                }
                this.bannerSub.textContent = subText;
                this.bannerEl.classList.add('show');
            } else {
                // Defender turn: show defender pick screen, pause pre-raid timer
                this.phaseTimer = 999999; // paused until player picks
                this.bannerEl.classList.remove('show');
                this.scene._showDefenderPick();
            }

            // Update role badge
            this.roleEl.textContent = isRaider ? 'YOU: RAIDER' : 'YOU: DEFENDER';
            this.roleEl.className = isRaider ? 'raider' : 'defender';
            this.turnEl.textContent = `RAID ${this.currentTurn} / ${this.maxTurns}`;

            // Show/hide chain button for touch devices
            if (this.scene._chainBtn) {
                this.scene._chainBtn.setVisible(!isRaider && this.scene.sys.game.device.input.touch);
            }

            // Environment swap for variety
            this.scene.setEnvironment(isRaider ? 'stadium' : 'courtyard');

            this.updateTimerDisplay();
            window.SoundEngine.playTurnChime();
        }

        startRaidActive() {
            this.phase = GAME_PHASE.RAID_ACTIVE;
            this.bannerEl.classList.remove('show');
            let role = this.playerRole === PLAYER_ROLE.RAIDER ? 'RAIDING' : 'DEFENDING';
            if (this.scene.superRaidActive) role = 'SUPER RAID';
            if (this.scene.doOrDieActive) role = 'DO-OR-DIE';
            this.turnEl.textContent = `RAID ${this.currentTurn} — ${role}`;

            // Start cant drone
            if (this.playerRole === PLAYER_ROLE.RAIDER) {
                window.SoundEngine.startCant();
            } else {
                window.SoundEngine.startCant(); // cant plays for AI raider too
            }
        }

        endRaid(reason) {
            this.phase = GAME_PHASE.RAID_RESULT;
            this.phaseTimer = GAME_CONFIG.PHASE_RESULT_TIME;
            window.SoundEngine.stopCant();

            let title='', sub='';
            const isPlayerRaider = this.playerRole === PLAYER_ROLE.RAIDER;
            const tagged = this.scene.defenders.filter(d => d.state === ENTITY_STATE.TAGGED).length;
            const bonus = this.scene.bonusClaimed ? 1 : 0;
            const superRaid = this.scene.superRaidActive;

            if (reason==='time_up') {
                title='TIME UP!'; sub='Raider ran out of breath';
                this.scene.defenderScore++;
                // Do-or-Die: time up also counts as failed
                if (this.scene.doOrDieActive) {
                    this.scene.defenderScore += KABADDI_RULES.DO_OR_DIE_PENALTY;
                    sub += ' — Do-or-Die FAILED!';
                }
            }
            else if (reason==='tackled') {
                title='TACKLED!'; sub='Defenders bring down the raider';
                if (this.scene.doOrDieActive) {
                    this.scene.defenderScore += KABADDI_RULES.DO_OR_DIE_PENALTY;
                    sub += ' — Do-or-Die FAILED!';
                }
            }
            else if (reason==='dod_fail') {
                title = 'DO-OR-DIE FAILED!';
                sub = 'Empty return — defenders get a point!';
            }
            else if (reason==='returned') {
                title = 'SAFE RETURN!';
                const parts = [];
                if (tagged > 0) parts.push(`${tagged} tag${tagged>1?'s':''}`);
                if (bonus) parts.push('bonus line');
                if (superRaid && tagged > 0) parts.push('SUPER RAID x2');
                sub = parts.length > 0
                    ? `Raider scored: ${parts.join(' + ')}!`
                    : 'Raider escaped without a touch!';
            }

            this.bannerTitle.textContent = title;
            this.bannerSub.textContent = sub;
            this.bannerEl.classList.add('show');
            document.getElementById('hud-raider-score').textContent = this.scene.raiderScore;
            document.getElementById('hud-defender-score').textContent = this.scene.defenderScore;
            window.SoundEngine.playImpact(0.6);
        }

        advanceTurn() {
            this.currentTurn++;
            if (this.currentTurn > this.maxTurns) { this.endMatch(); }
            else { this.startPreRaid(); this.scene.resetRaidPositions(); }
        }

        endMatch() {
            this.phase = GAME_PHASE.MATCH_OVER;
            const rs=this.scene.raiderScore, ds=this.scene.defenderScore;
            this.bannerTitle.textContent = rs>ds?'YOU WIN!':ds>rs?'DEFENDERS WIN!':'DRAW!';
            this.bannerSub.textContent = `Final: You ${rs} — ${ds} Defenders  |  Tap to continue`;

            // Add click/touch handler directly on the HTML banner overlay
            const bannerClickHandler = () => {
                this.bannerEl.removeEventListener('pointerdown', bannerClickHandler);
                this.bannerEl.removeEventListener('touchend', bannerClickHandler);
                this.bannerEl.classList.remove('show');
                this.scene.scene.start('MenuScene');
            };
            // Small delay so the banner shows first
            setTimeout(() => {
                this.bannerEl.addEventListener('pointerdown', bannerClickHandler);
                this.bannerEl.addEventListener('touchend', bannerClickHandler);
            }, 500);
            this.bannerEl.classList.add('show');
        }

        update(dt) {
            if (this.phase===GAME_PHASE.PRE_RAID) { this.phaseTimer-=dt*1000; if(this.phaseTimer<=0) this.startRaidActive(); }
            if (this.phase===GAME_PHASE.RAID_ACTIVE) {
                this.cantTimeRemaining-=dt;
                if(this.cantTimeRemaining<=0){this.cantTimeRemaining=0;this.endRaid('time_up');}
                this.updateTimerDisplay();
                // Update cant sound intensity
                window.SoundEngine.setCantIntensity(this.cantRatio);
            }
            if (this.phase===GAME_PHASE.RAID_RESULT) { this.phaseTimer-=dt*1000; if(this.phaseTimer<=0) this.advanceTurn(); }
        }

        updateTimerDisplay() {
            const t=Math.max(0,Math.ceil(this.cantTimeRemaining));
            this.timerEl.textContent=`${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
            this.timerEl.style.color = this.cantTimeRemaining<GAME_CONFIG.CANT_WARNING ? '#ff2200' : '#f0c040';
        }

        get cantRatio() { return this.cantTimeRemaining/this.cantTimeMax; }
        get isRaidActive() { return this.phase===GAME_PHASE.RAID_ACTIVE; }
        get isPlayerRaider() { return this.playerRole===PLAYER_ROLE.RAIDER; }
        get isPlayerDefender() { return this.playerRole===PLAYER_ROLE.DEFENDER; }
    }
    window.TurnManager = TurnManager;
    </script>

    <!-- ================================================================
         UltimateSystem (unchanged from Slice 3, + sound hooks)
         ================================================================ -->
    <script>
    class UltimateSystem {
        constructor(scene) { this.scene=scene; this.meter=0; this.maxMeter=GAME_CONFIG.ULT_METER_MAX; this.active=false; this.timer=0;
            this.fillEl=document.getElementById('skill-meter-fill'); this.badgeEl=document.getElementById('ult-ready-badge'); }

        addMeter(a) { if(this.active)return; this.meter=Math.min(this.meter+a,this.maxMeter); this.updateUI(); }

        tryActivate() {
            if(this.active||this.meter<this.maxMeter) return false;
            this.active=true; this.timer=GAME_CONFIG.ULT_DURATION; this.meter=0; this.updateUI();
            const s=this.scene, px=s.player.x, py=s.player.y;
            const isRaider = s.turnManager.isPlayerRaider;
            const color = isRaider ? GAME_CONFIG.COLORS.AURA_AGILITY : GAME_CONFIG.COLORS.AURA_STRENGTH;
            s.vfx.startAura(px,py,color); s.vfx.spawnUltBurst(px,py,color);
            window.HapticsManager.ultimate();
            window.SoundEngine.playUltimate();
            const label = isRaider ? 'AGILITY ESCAPE!' : 'STRENGTH HOLD!';
            document.getElementById('hud-turn').textContent = `ULTIMATE — ${label}`;
            return true;
        }

        update(dt) {
            if(!this.active && this.scene.turnManager.isRaidActive) this.addMeter(GAME_CONFIG.ULT_GAIN_TICK*dt);
            if(this.active) { this.timer-=dt*1000; if(this.timer<=0) this.deactivate();
                this.scene.vfx.updateAura(this.scene.player.x,this.scene.player.y,dt); }
        }

        deactivate() {
            this.active=false; this.timer=0; this.scene.vfx.stopAura();
            this.scene.playerState=ENTITY_STATE.IDLE;
            if(this.scene.turnManager.isRaidActive) {
                const role=this.scene.turnManager.isPlayerRaider?'RAIDING':'DEFENDING';
                document.getElementById('hud-turn').textContent=`RAID ${this.scene.turnManager.currentTurn} — ${role}`;
            }
        }

        updateUI() {
            const pct=(this.meter/this.maxMeter)*100; this.fillEl.style.width=pct+'%';
            if(this.meter>=this.maxMeter&&!this.active){this.fillEl.classList.add('full');this.badgeEl.classList.add('show');}
            else{this.fillEl.classList.remove('full');this.badgeEl.classList.remove('show');}
        }
        reset() { this.meter=0;this.active=false;this.timer=0;this.updateUI();this.scene.vfx.stopAura(); }
    }
    window.UltimateSystem = UltimateSystem;
    </script>

    <!-- ================================================================
         PHASE 1 VISUAL UPGRADE — ProceduralCharacterRenderer
         Layered body parts, bold outlines, team accents, jersey numbers.
         Reusable class: call drawCharacter(gfx, opts) per frame or once.
         ================================================================ -->
    <script>
    class ProceduralCharacterRenderer {
        /**
         * Draw a stylized kabaddi athlete onto a Phaser Graphics object.
         * @param {Phaser.GameObjects.Graphics} gfx - cleared before drawing
         * @param {object} opts
         *   bodyColor, accentColor, outlineColor, number, isRaider,
         *   state (ENTITY_STATE), animPhase (0..2PI), facingX (-1..1)
         */
        static drawCharacter(gfx, opts = {}) {
            const {
                bodyColor = 0xe85030,
                accentColor = 0xcc3a20,
                outlineColor = 0x1a1a2e,
                jerseyColor = null,
                number = '7',
                isRaider = true,
                state = 'idle',
                animPhase = 0,
                facingX = 0,
                scale = 1,
            } = opts;

            gfx.clear();
            const s = scale;

            // Animation offsets
            const isMoving = state === 'moving' || state === 'dashing' || state === 'tackling';
            const isStunned = state === 'stunned';
            const isDashing = state === 'dashing';
            const isTackling = state === 'tackling';
            const isIdle = state === 'idle';
            const isUltimate = state === 'ultimate';

            // Idle breathing (subtle scale oscillation)
            const breathe = isIdle ? Math.sin(animPhase * 2) * 0.02 : 0;

            // Bob and squash/stretch
            const bobY = isMoving ? Math.sin(animPhase * 8) * 3 * s :
                         isIdle ? Math.sin(animPhase * 2) * 1.2 * s : 0;
            const squashX = isDashing ? 0.82 :
                            isTackling ? 1.15 :
                            isUltimate ? 1.08 + Math.sin(animPhase * 6) * 0.04 :
                            (isMoving ? 1 + Math.sin(animPhase * 8) * 0.06 : 1 + breathe);
            const squashY = isDashing ? 1.22 :
                            isTackling ? 0.88 :
                            isUltimate ? 1.04 + Math.sin(animPhase * 6) * 0.03 :
                            (isMoving ? 1 - Math.sin(animPhase * 8) * 0.06 : 1 - breathe);
            const leanX = facingX * (isTackling ? 6 : isMoving ? 3 : 0) * s;
            const stunWobble = isStunned ? Math.sin(animPhase * 12) * 5 * s : 0;

            const ox = leanX + stunWobble; // overall x offset
            const oy = bobY;               // overall y offset

            // ── LEGS (tapered base) ──
            const legW = 10 * s * squashX;
            const legH = 10 * s * squashY;
            const legY = 18 * s + oy;
            const legSpread = isMoving ? Math.sin(animPhase * 8) * 4 * s : 0;

            // Left leg
            gfx.fillStyle(outlineColor, 1);
            gfx.fillRoundedRect(ox - legW - 2 - legSpread, legY - 1, legW + 2, legH + 2, 3 * s);
            gfx.fillStyle(bodyColor, 0.85);
            gfx.fillRoundedRect(ox - legW - legSpread, legY, legW, legH, 3 * s);

            // Right leg
            gfx.fillStyle(outlineColor, 1);
            gfx.fillRoundedRect(ox + 0 + legSpread - 1, legY - 1, legW + 2, legH + 2, 3 * s);
            gfx.fillStyle(bodyColor, 0.85);
            gfx.fillRoundedRect(ox + 0 + legSpread, legY, legW, legH, 3 * s);

            // ── TORSO (trapezoid — wider at shoulders) ──
            const torsoW = 30 * s * squashX;
            const torsoH = 28 * s * squashY;
            const torsoY = -8 * s + oy;

            // Outline
            gfx.fillStyle(outlineColor, 1);
            gfx.fillRoundedRect(ox - torsoW / 2 - 2, torsoY - 2, torsoW + 4, torsoH + 4, 7 * s);
            // Main torso
            gfx.fillStyle(bodyColor, 1);
            gfx.fillRoundedRect(ox - torsoW / 2, torsoY, torsoW, torsoH, 6 * s);

            // Jersey panel (lighter center stripe)
            const jColor = jerseyColor || bodyColor;
            gfx.fillStyle(jColor, 0.3);
            gfx.fillRoundedRect(ox - 6 * s, torsoY + 4 * s, 12 * s, torsoH - 8 * s, 3 * s);

            // Shoulder pads (accent)
            const shoulderW = 34 * s * squashX;
            const shoulderH = 8 * s;
            const shoulderY = torsoY - 1 * s;
            gfx.fillStyle(outlineColor, 1);
            gfx.fillRoundedRect(ox - shoulderW / 2 - 1.5, shoulderY - 1.5, shoulderW + 3, shoulderH + 3, 3 * s);
            gfx.fillStyle(accentColor, 1);
            gfx.fillRoundedRect(ox - shoulderW / 2, shoulderY, shoulderW, shoulderH, 3 * s);
            // Shoulder highlight
            gfx.fillStyle(0xffffff, 0.12);
            gfx.fillRoundedRect(ox - shoulderW / 2 + 2 * s, shoulderY + 1 * s, shoulderW - 4 * s, 3 * s, 2 * s);

            // ── ARMS (small circles at sides) ──
            const armY = torsoY + 12 * s + oy;
            const armSpread = isTackling ? 12 * s : 17 * s * squashX;
            const armSwing = isTackling ? -8 * s : // arms forward for tackle
                             isMoving ? Math.sin(animPhase * 8) * 5 * s :
                             isIdle ? Math.sin(animPhase * 2 + 0.5) * 1.5 * s : 0;
            const armR = 6 * s;
            const tackleArmFwd = isTackling ? -8 * s * Math.abs(facingX || 0.5) : 0;

            // Left arm
            const laX = ox - armSpread + tackleArmFwd;
            const laY = armY - armSwing;
            gfx.fillStyle(outlineColor, 1);
            gfx.fillCircle(laX, laY, armR + 2 * s);
            gfx.fillStyle(bodyColor, 0.9);
            gfx.fillCircle(laX, laY, armR);
            gfx.fillStyle(0xd4a574, 1);
            gfx.fillCircle(laX, laY + 5 * s, 3 * s);

            // Right arm
            const raX = ox + armSpread + tackleArmFwd;
            const raY = armY + armSwing;
            gfx.fillStyle(outlineColor, 1);
            gfx.fillCircle(raX, raY, armR + 2 * s);
            gfx.fillStyle(bodyColor, 0.9);
            gfx.fillCircle(raX, raY, armR);
            gfx.fillStyle(0xd4a574, 1);
            gfx.fillCircle(raX, raY + 5 * s, 3 * s);

            // ── HEAD ──
            const headR = 14 * s;
            const headY = -24 * s + oy;
            // Outline
            gfx.fillStyle(outlineColor, 1);
            gfx.fillCircle(ox, headY, headR + 2.5 * s);
            // Skin
            gfx.fillStyle(0xd4a574, 1);
            gfx.fillCircle(ox, headY, headR);
            // Hair (half-circle on top)
            gfx.fillStyle(0x1a1a2e, 1);
            gfx.fillRect(ox - headR, headY - headR, headR * 2, headR * 0.7);
            // Team-colored headband
            gfx.fillStyle(bodyColor, 0.9);
            gfx.fillRect(ox - headR + 1, headY - headR * 0.35, headR * 2 - 2, 4 * s);

            // Eyes (simple dots — look in facing direction)
            const eyeOffX = facingX * 3 * s;
            gfx.fillStyle(0xffffff, 0.9);
            gfx.fillCircle(ox - 4 * s + eyeOffX, headY - 1 * s, 2.5 * s);
            gfx.fillCircle(ox + 4 * s + eyeOffX, headY - 1 * s, 2.5 * s);
            gfx.fillStyle(0x1a1a2e, 1);
            gfx.fillCircle(ox - 3.5 * s + eyeOffX, headY - 1 * s, 1.2 * s);
            gfx.fillCircle(ox + 4.5 * s + eyeOffX, headY - 1 * s, 1.2 * s);

            // ── EDGE GLOW (team-colored rim light on silhouette) ──
            const glowAlpha = isUltimate ? 0.5 + Math.sin(animPhase * 6) * 0.2 : 0.25;
            gfx.lineStyle(isUltimate ? 2.5 : 1.5, bodyColor, glowAlpha);
            gfx.strokeCircle(ox, headY, headR + 3 * s);
            gfx.strokeRoundedRect(ox - torsoW / 2 - 3, torsoY - 3, torsoW + 6, torsoH + 6, 8 * s);

            // ── STUN INDICATOR (spinning stars above head) ──
            if (isStunned) {
                const starCount = 3;
                for (let si = 0; si < starCount; si++) {
                    const starAngle = animPhase * 4 + (Math.PI * 2 / starCount) * si;
                    const starR = 12 * s;
                    const sx = ox + Math.cos(starAngle) * starR;
                    const sy = headY - headR - 6 * s + Math.sin(starAngle) * 4 * s;
                    const starAlpha = 0.5 + Math.sin(animPhase * 8 + si) * 0.3;
                    gfx.fillStyle(0xf0c040, starAlpha);
                    // 4-pointed star
                    const ss = 2.5 * s;
                    gfx.fillTriangle(sx, sy - ss, sx - ss * 0.4, sy, sx + ss * 0.4, sy);
                    gfx.fillTriangle(sx, sy + ss, sx - ss * 0.4, sy, sx + ss * 0.4, sy);
                    gfx.fillTriangle(sx - ss, sy, sx, sy - ss * 0.4, sx, sy + ss * 0.4);
                    gfx.fillTriangle(sx + ss, sy, sx, sy - ss * 0.4, sx, sy + ss * 0.4);
                }
            }

            // ── ULTIMATE GLOW (bright body overlay) ──
            if (isUltimate) {
                const ultGlow = 0.12 + Math.sin(animPhase * 6) * 0.06;
                gfx.fillStyle(bodyColor, ultGlow);
                gfx.fillRoundedRect(ox - torsoW / 2, torsoY, torsoW, torsoH, 6 * s);
                gfx.fillCircle(ox, headY, headR);
            }
        }

        /**
         * Draw a premium shadow (multi-layer ellipse)
         */
        static drawShadow(gfx, x, y, intensity = 1, scale = 1) {
            gfx.clear();
            const layers = [
                { rx: 30 * scale, ry: 10 * scale, a: 0.10 * intensity },
                { rx: 22 * scale, ry: 7 * scale, a: 0.18 * intensity },
                { rx: 14 * scale, ry: 5 * scale, a: 0.28 * intensity },
            ];
            layers.forEach(l => {
                gfx.fillStyle(0x000000, l.a);
                gfx.fillEllipse(x, y + 28, l.rx * 2, l.ry * 2);
            });
        }

        /**
         * Draw a pulsing glow ring beneath an entity
         */
        static drawGlowRing(gfx, x, y, phase, color = 0xff4422, intensity = 1) {
            gfx.clear();
            const ps = 1 + Math.sin(phase) * 0.15;
            const pa = (0.18 + Math.sin(phase) * 0.08) * intensity;
            // Outer ring
            gfx.lineStyle(2.5, color, pa * 0.4);
            gfx.strokeEllipse(x, y + 28, 56 * ps, 20 * ps);
            // Inner ring
            gfx.lineStyle(1.5, color, pa * 0.8);
            gfx.strokeEllipse(x, y + 28, 40 * ps, 14 * ps);
            // Center dot
            gfx.fillStyle(color, pa * 1.5);
            gfx.fillCircle(x, y + 28, 3.5 * ps);
            // Ambient glow
            gfx.fillStyle(color, pa * 0.08);
            gfx.fillCircle(x, y + 28, 28 * ps);
        }
    }
    window.ProceduralCharacterRenderer = ProceduralCharacterRenderer;
    </script>

    <!-- ================================================================
         PHASE 1 VISUAL UPGRADE — PremiumCourtRenderer
         Gradient fills, zone coloring, glowing double-stroke lines,
         vignette overlay, surface texture patterns.
         ================================================================ -->
    <script>
    class PremiumCourtRenderer {
        /**
         * Draw the full court onto a Phaser Graphics object.
         * @param {Phaser.GameObjects.Graphics} gfx
         * @param {string} env - 'stadium' or 'courtyard'
         * @param {number} time - game time for animated elements
         */
        static drawCourt(gfx, env = 'stadium', time = 0) {
            const { COURT, COLORS } = GAME_CONFIG;
            const cx = COURT.CENTER_X, cy = COURT.CENTER_Y;
            const hw = COURT.WIDTH / 2, hh = COURT.HEIGHT / 2;
            const isCY = env === 'courtyard';

            gfx.clear();

            // ── Background fill ──
            gfx.fillStyle(isCY ? 0x080603 : 0x080b12, 1);
            gfx.fillRect(0, 0, GAME_CONFIG.DESIGN_WIDTH, GAME_CONFIG.DESIGN_HEIGHT);

            // ── Ambient glow behind court ──
            const ambientColor = isCY ? 0x3a2a14 : 0x0a2030;
            gfx.fillStyle(ambientColor, 0.25);
            gfx.fillEllipse(cx, cy, COURT.WIDTH + 100, COURT.HEIGHT + 80);
            gfx.fillStyle(ambientColor, 0.12);
            gfx.fillEllipse(cx, cy, COURT.WIDTH + 200, COURT.HEIGHT + 160);

            // ── Lobby (outer border area) ──
            const lw = COURT.LOBBY_WIDTH;
            gfx.fillStyle(isCY ? COLORS.COURTYARD_LOBBY : COLORS.LOBBY, 1);
            gfx.fillRoundedRect(cx - hw - lw, cy - hh - lw, COURT.WIDTH + lw * 2, COURT.HEIGHT + lw * 2, isCY ? 4 : 12);

            // ── Court surface ──
            gfx.fillStyle(isCY ? COLORS.COURTYARD_FILL : COLORS.COURT_FILL, 1);
            gfx.fillRoundedRect(cx - hw, cy - hh, COURT.WIDTH, COURT.HEIGHT, isCY ? 2 : 8);

            // ── Zone coloring (raider half vs defender half) ──
            // Left half (raider territory) — slightly lighter
            gfx.fillStyle(isCY ? 0x2a2014 : 0x1a4030, 0.35);
            gfx.fillRect(cx - hw, cy - hh, hw, COURT.HEIGHT);
            // Right half (defender territory) — slightly different tint
            gfx.fillStyle(isCY ? 0x201a12 : 0x142a3a, 0.35);
            gfx.fillRect(cx, cy - hh, hw, COURT.HEIGHT);

            // ── Surface texture ──
            if (isCY) {
                // Stone tile pattern
                gfx.lineStyle(1, 0x3a2a18, 0.12);
                const tileSize = 40;
                for (let tx = cx - hw; tx < cx + hw; tx += tileSize) {
                    gfx.lineBetween(tx, cy - hh, tx, cy + hh);
                }
                for (let ty = cy - hh; ty < cy + hh; ty += tileSize) {
                    gfx.lineBetween(cx - hw, ty, cx + hw, ty);
                }
                // Weathering spots
                for (let i = 0; i < 12; i++) {
                    const sx = cx - hw + 80 + (i * 97) % COURT.WIDTH;
                    const sy = cy - hh + 40 + (i * 73) % COURT.HEIGHT;
                    gfx.fillStyle(0x1a1208, 0.2);
                    gfx.fillCircle(sx, sy, 8 + (i % 3) * 4);
                }
            } else {
                // Mat grain (subtle horizontal lines)
                gfx.lineStyle(1, 0x244a38, 0.06);
                for (let ty = cy - hh + 4; ty < cy + hh; ty += 8) {
                    gfx.lineBetween(cx - hw, ty, cx + hw, ty);
                }
                // Court polish spots (circular highlights)
                gfx.fillStyle(0x2a5a42, 0.12);
                gfx.fillEllipse(cx - hw / 2, cy, 120, 80);
                gfx.fillEllipse(cx + hw / 2, cy, 120, 80);
            }

            // ── Court border (double-stroke with glow) ──
            const borderColor = isCY ? COLORS.COURTYARD_BORDER : COLORS.COURT_BORDER;
            // Outer glow
            gfx.lineStyle(6, borderColor, 0.08);
            gfx.strokeRoundedRect(cx - hw - 1, cy - hh - 1, COURT.WIDTH + 2, COURT.HEIGHT + 2, isCY ? 3 : 9);
            // Main border
            gfx.lineStyle(isCY ? 3 : 2.5, borderColor, 0.85);
            gfx.strokeRoundedRect(cx - hw, cy - hh, COURT.WIDTH, COURT.HEIGHT, isCY ? 2 : 8);
            // Inner border
            gfx.lineStyle(1, borderColor, 0.25);
            gfx.strokeRoundedRect(cx - hw + 4, cy - hh + 4, COURT.WIDTH - 8, COURT.HEIGHT - 8, isCY ? 1 : 6);

            // ── Midline (glowing center line) ──
            const lineColor = isCY ? COLORS.COURTYARD_LINE : COLORS.MIDLINE;
            // Midline glow
            gfx.lineStyle(8, lineColor, 0.06);
            gfx.lineBetween(cx, cy - hh + 2, cx, cy + hh - 2);
            // Midline main
            gfx.lineStyle(2.5, lineColor, 0.9);
            gfx.lineBetween(cx, cy - hh + 2, cx, cy + hh - 2);
            // Center circle
            gfx.lineStyle(1.5, lineColor, 0.4);
            gfx.strokeEllipse(cx, cy, 50, 30);
            gfx.fillStyle(lineColor, 0.06);
            gfx.fillEllipse(cx, cy, 50, 30);

            // ── Baulk lines (glowing) ──
            const baulkColor = isCY ? 0x8b4422 : COLORS.BAULK_LINE;
            gfx.lineStyle(5, baulkColor, 0.05);
            gfx.lineBetween(cx - COURT.BAULK_OFFSET, cy - hh + 2, cx - COURT.BAULK_OFFSET, cy + hh - 2);
            gfx.lineBetween(cx + COURT.BAULK_OFFSET, cy - hh + 2, cx + COURT.BAULK_OFFSET, cy + hh - 2);
            gfx.lineStyle(2, baulkColor, 0.7);
            gfx.lineBetween(cx - COURT.BAULK_OFFSET, cy - hh + 2, cx - COURT.BAULK_OFFSET, cy + hh - 2);
            gfx.lineBetween(cx + COURT.BAULK_OFFSET, cy - hh + 2, cx + COURT.BAULK_OFFSET, cy + hh - 2);

            // ── Bonus lines (dashed, subtle) ──
            const bonusColor = isCY ? 0x446688 : COLORS.BONUS_LINE;
            gfx.lineStyle(1.5, bonusColor, 0.4);
            const bo = COURT.BAULK_OFFSET + 80;
            PremiumCourtRenderer._dashedLine(gfx, cx - bo, cy - hh + 10, cx - bo, cy + hh - 10, 8, 6);
            PremiumCourtRenderer._dashedLine(gfx, cx + bo, cy - hh + 10, cx + bo, cy + hh - 10, 8, 6);

            // ── Corner marks (decorative) ──
            const csz = 22;
            [[cx - hw + 6, cy - hh + 6], [cx + hw - 6, cy - hh + 6], [cx - hw + 6, cy + hh - 6], [cx + hw - 6, cy + hh - 6]].forEach(([x, y]) => {
                const sx = x < cx ? 1 : -1, sy = y < cy ? 1 : -1;
                gfx.lineStyle(2, borderColor, 0.5);
                gfx.lineBetween(x, y, x + csz * sx, y);
                gfx.lineBetween(x, y, x, y + csz * sy);
                // Corner dot
                gfx.fillStyle(borderColor, 0.3);
                gfx.fillCircle(x, y, 3);
            });

            // ── Courtyard ornamental diamonds ──
            if (isCY) {
                const dSize = 12;
                for (let dy = cy - hh + 30; dy < cy + hh - 20; dy += 50) {
                    gfx.lineStyle(1, COLORS.COURTYARD_BORDER, 0.2);
                    gfx.strokePoints([
                        { x: cx, y: dy - dSize }, { x: cx + dSize, y: dy },
                        { x: cx, y: dy + dSize }, { x: cx - dSize, y: dy },
                        { x: cx, y: dy - dSize }
                    ], true);
                }
            }

            // ── Vignette overlay (darkened edges) ──
            const vignetteW = GAME_CONFIG.DESIGN_WIDTH;
            const vignetteH = GAME_CONFIG.DESIGN_HEIGHT;
            // Top and bottom strips
            gfx.fillStyle(0x000000, 0.35);
            gfx.fillRect(0, 0, vignetteW, 40);
            gfx.fillRect(0, vignetteH - 30, vignetteW, 30);
            gfx.fillStyle(0x000000, 0.2);
            gfx.fillRect(0, 40, vignetteW, 30);
            gfx.fillRect(0, vignetteH - 60, vignetteW, 30);
            // Side strips
            gfx.fillStyle(0x000000, 0.15);
            gfx.fillRect(0, 0, 30, vignetteH);
            gfx.fillRect(vignetteW - 30, 0, 30, vignetteH);
        }

        static _dashedLine(gfx, x1, y1, x2, y2, dl, gl) {
            const dx = x2 - x1, dy = y2 - y1, d = Math.sqrt(dx * dx + dy * dy);
            const nx = dx / d, ny = dy / d;
            let dr = 0, on = true;
            while (dr < d) {
                const s = on ? dl : gl;
                const e = Math.min(dr + s, d);
                if (on) gfx.lineBetween(x1 + nx * dr, y1 + ny * dr, x1 + nx * e, y1 + ny * e);
                dr = e; on = !on;
            }
        }

        /**
         * Draw spectator silhouettes along court edges.
         * Creates a lively arena atmosphere with bobbing crowd shapes.
         */
        static drawSpectators(gfx, env = 'stadium', time = 0) {
            const { COURT } = GAME_CONFIG;
            const cx = COURT.CENTER_X, cy = COURT.CENTER_Y;
            const hw = COURT.WIDTH / 2, hh = COURT.HEIGHT / 2;
            const isCY = env === 'courtyard';
            const crowdColor = isCY ? 0x1a1208 : 0x0a1520;
            const highlightColor = isCY ? 0x3a2a14 : 0x142a3a;

            gfx.clear();

            // Top bleacher row
            const topY = cy - hh - 65;
            for (let i = 0; i < 28; i++) {
                const sx = cx - hw + 20 + i * (COURT.WIDTH - 40) / 27;
                const bob = Math.sin(time * 2.5 + i * 0.7) * 2;
                const h = 16 + (i % 3) * 3;
                // Body
                gfx.fillStyle(crowdColor, 0.6 + Math.sin(time + i) * 0.1);
                gfx.fillRoundedRect(sx - 5, topY - h + bob, 10, h, 3);
                // Head
                gfx.fillStyle(crowdColor, 0.7);
                gfx.fillCircle(sx, topY - h - 4 + bob, 5);
                // Occasional team color highlight
                if (i % 5 === 0) {
                    const tc = i < 14 ? GAME_CONFIG.COLORS.PLAYER_BODY : GAME_CONFIG.COLORS.DEFENDER_BODY;
                    gfx.fillStyle(tc, 0.2);
                    gfx.fillRoundedRect(sx - 4, topY - h + 2 + bob, 8, h - 4, 2);
                }
            }

            // Bottom bleacher row
            const botY = cy + hh + 55;
            for (let i = 0; i < 28; i++) {
                const sx = cx - hw + 20 + i * (COURT.WIDTH - 40) / 27;
                const bob = Math.sin(time * 2.2 + i * 0.8 + 1) * 2;
                const h = 14 + (i % 4) * 2;
                gfx.fillStyle(crowdColor, 0.5 + Math.sin(time * 1.3 + i) * 0.1);
                gfx.fillRoundedRect(sx - 5, botY + bob, 10, h, 3);
                gfx.fillStyle(crowdColor, 0.65);
                gfx.fillCircle(sx, botY - 4 + bob, 4.5);
                if (i % 6 === 2) {
                    const tc = i < 14 ? GAME_CONFIG.COLORS.PLAYER_BODY : GAME_CONFIG.COLORS.DEFENDER_BODY;
                    gfx.fillStyle(tc, 0.15);
                    gfx.fillRoundedRect(sx - 3, botY + 2 + bob, 6, h - 3, 2);
                }
            }

            // Side spectators (smaller groups)
            const leftX = cx - hw - 55;
            const rightX = cx + hw + 55;
            for (let i = 0; i < 12; i++) {
                const sy = cy - hh + 30 + i * (COURT.HEIGHT - 60) / 11;
                const bobL = Math.sin(time * 2 + i * 0.9) * 1.5;
                const bobR = Math.sin(time * 2.3 + i * 1.1 + 2) * 1.5;

                // Left side
                gfx.fillStyle(crowdColor, 0.45);
                gfx.fillRoundedRect(leftX - 4, sy - 6 + bobL, 8, 12, 3);
                gfx.fillCircle(leftX, sy - 9 + bobL, 4);

                // Right side
                gfx.fillStyle(crowdColor, 0.45);
                gfx.fillRoundedRect(rightX - 4, sy - 6 + bobR, 8, 12, 3);
                gfx.fillCircle(rightX, sy - 9 + bobR, 4);
            }
        }

        /**
         * Draw zone labels and team marks on the court.
         * Called once per environment swap, drawn to a separate graphics layer.
         */
        static drawZoneLabels(scene, env = 'stadium') {
            const { COURT } = GAME_CONFIG;
            const cx = COURT.CENTER_X, cy = COURT.CENTER_Y;
            const isCY = env === 'courtyard';

            // Clean up previous labels if any
            if (scene._zoneLabels) {
                scene._zoneLabels.forEach(l => l.destroy());
            }
            scene._zoneLabels = [];

            const labelColor = isCY ? 'rgba(200,144,64,0.12)' : 'rgba(240,192,64,0.12)';
            const fontBase = {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontStyle: 'bold',
                align: 'center'
            };

            // Zone labels
            const rLabel = scene.add.text(cx - COURT.BAULK_OFFSET / 2 - 40, cy, 'RAIDER\nTERRITORY', {
                ...fontBase, fontSize: '14px', color: 'rgba(232,80,48,0.12)', letterSpacing: '3px', lineSpacing: 4
            }).setOrigin(0.5).setDepth(1);

            const dLabel = scene.add.text(cx + COURT.BAULK_OFFSET / 2 + 40, cy, 'DEFENDER\nTERRITORY', {
                ...fontBase, fontSize: '14px', color: 'rgba(48,144,232,0.12)', letterSpacing: '3px', lineSpacing: 4
            }).setOrigin(0.5).setDepth(1);

            // Baulk line labels
            const baulkLabelStyle = { ...fontBase, fontSize: '8px', color: labelColor, letterSpacing: '2px' };
            const bL = scene.add.text(cx - COURT.BAULK_OFFSET, cy - COURT.HEIGHT / 2 + 12, 'BAULK', baulkLabelStyle).setOrigin(0.5, 0).setDepth(1);
            const bR = scene.add.text(cx + COURT.BAULK_OFFSET, cy - COURT.HEIGHT / 2 + 12, 'BAULK', baulkLabelStyle).setOrigin(0.5, 0).setDepth(1);

            // Bonus line labels
            const bo = COURT.BAULK_OFFSET + 80;
            const bonusStyle = { ...fontBase, fontSize: '7px', color: isCY ? 'rgba(68,102,136,0.15)' : 'rgba(68,170,255,0.15)', letterSpacing: '1px' };
            const boL = scene.add.text(cx - bo, cy - COURT.HEIGHT / 2 + 12, 'BONUS', bonusStyle).setOrigin(0.5, 0).setDepth(1);
            const boR = scene.add.text(cx + bo, cy - COURT.HEIGHT / 2 + 12, 'BONUS', bonusStyle).setOrigin(0.5, 0).setDepth(1);

            // Center mark — "PKC" logo
            const logoStyle = { ...fontBase, fontSize: '22px', color: labelColor, letterSpacing: '8px' };
            const logo = scene.add.text(cx, cy, 'PKC', logoStyle).setOrigin(0.5).setDepth(1).setAlpha(0.6);

            scene._zoneLabels = [rLabel, dLabel, bL, bR, boL, boR, logo];
        }
    }
    window.PremiumCourtRenderer = PremiumCourtRenderer;
    </script>

    <!-- ================================================================
         PHASE 1 VISUAL UPGRADE — AnimationSystem
         State-based procedural animation: squash/stretch, bob, limb offsets.
         Tracks per-entity animation phase and computes draw params.
         ================================================================ -->
    <script>
    class AnimationSystem {
        constructor() {
            this.entities = new Map(); // id → { phase, state, facingX, dirty, drawPhase }
            // Phase 5: Quality tier detection
            this.quality = AnimationSystem.detectQuality();
            this.drawInterval = this.quality === 'low' ? 0.06 : // ~16fps character redraws
                                this.quality === 'medium' ? 0.033 : // ~30fps
                                0; // every frame
        }

        static detectQuality() {
            // Check for mobile / low-end indicators
            const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            const cores = navigator.hardwareConcurrency || 2;
            if (isMobile && cores <= 4) return 'low';
            if (isMobile || cores <= 4) return 'medium';
            return 'high';
        }

        register(id) {
            this.entities.set(id, {
                phase: Math.random() * Math.PI * 2,
                state: 'idle', facingX: 0,
                dirty: true,         // needs redraw
                drawTimer: 0,        // time since last draw
                lastState: '',       // for detecting state changes
                lastFacingSnap: 0,   // quantized facing for dirty check
            });
        }

        update(id, dt, state, moveVecX = 0) {
            const e = this.entities.get(id);
            if (!e) return;

            const prevState = e.state;
            e.state = state;

            // Update facing smoothly
            if (Math.abs(moveVecX) > 0.1) {
                e.facingX += (Math.sign(moveVecX) - e.facingX) * Math.min(1, dt * 8);
            }

            // Advance animation phase
            const speedMult = state === 'dashing' || state === 'tackling' ? 2.5 :
                              state === 'moving' ? 1.5 : 0.5;
            e.phase += dt * speedMult;

            // Phase 5: Dirty detection — only redraw when visually meaningful change
            e.drawTimer += dt;
            const facingSnap = Math.round(e.facingX * 4) / 4; // quantize to 0.25 steps

            if (state !== prevState ||                    // state changed
                facingSnap !== e.lastFacingSnap ||        // facing changed noticeably
                state !== 'idle' ||                        // always redraw during action
                e.drawTimer >= this.drawInterval + 0.1) {  // idle refresh every ~100ms
                e.dirty = true;
                e.lastFacingSnap = facingSnap;
                e.lastState = state;
            }
        }

        getParams(id) {
            const e = this.entities.get(id);
            if (!e) return { animPhase: 0, state: 'idle', facingX: 0, dirty: true };
            return { animPhase: e.phase, state: e.state, facingX: e.facingX, dirty: e.dirty };
        }

        markDrawn(id) {
            const e = this.entities.get(id);
            if (e) { e.dirty = false; e.drawTimer = 0; }
        }
    }
    window.AnimationSystem = AnimationSystem;
    </script>

    <!-- ================================================================
         SLICE 5 — ComboSystem
         Tracks consecutive successful actions, applies multiplier.
         ================================================================ -->
    <script>
    class ComboSystem {
        constructor(scene) {
            this.scene = scene;
            this.count = 0;
            this.timer = 0;
            this.multiplier = 1.0;
            this.tier = -1;
            this.comboGfx = null;   // floating text graphics
        }

        /** Called when player scores a successful action (tag, dodge tackle, etc.) */
        addHit() {
            this.count++;
            this.timer = COMBO_CONFIG.TIMEOUT;
            this._recalcTier();

            // Floating combo text
            if (this.tier >= 0) {
                const t = COMBO_CONFIG.TIERS[this.tier];
                this._showComboText(t.label, t.color);

                // VFX escalation
                if (this.tier >= 1) this.scene.vfx.triggerShake(0.004 + this.tier * 0.003, 100);
                if (this.tier >= 2) window.HapticsManager.heavy();
                else window.HapticsManager.light();

                // Ultimate bonus
                const ultBonus = 1 + this.count * COMBO_CONFIG.ULT_BONUS_PER_COMBO;
                this.scene.ultimateSystem.addMeter(GAME_CONFIG.ULT_GAIN_TAG * (ultBonus - 1));
            }
        }

        /** Called when combo should break (tackled, timeout, etc.) */
        reset() {
            if (this.count >= 2) this._showComboText('COMBO OVER', 0x888888);
            this.count = 0;
            this.timer = 0;
            this.multiplier = 1.0;
            this.tier = -1;
        }

        update(dt) {
            if (this.count > 0) {
                this.timer -= dt * 1000;
                if (this.timer <= 0) this.reset();
            }
        }

        getMultiplier() { return this.multiplier; }

        _recalcTier() {
            this.tier = -1;
            this.multiplier = 1.0;
            for (let i = COMBO_CONFIG.TIERS.length - 1; i >= 0; i--) {
                if (this.count >= COMBO_CONFIG.TIERS[i].min) {
                    this.tier = i;
                    this.multiplier = COMBO_CONFIG.TIERS[i].mult;
                    break;
                }
            }
        }

        _showComboText(text, color) {
            // Destroy previous
            if (this.comboGfx) this.comboGfx.destroy();

            const px = this.scene.player.x;
            const py = this.scene.player.y - 60;
            const label = this.count > 1 ? `${this.count}x ${text}` : text;

            this.comboGfx = this.scene.add.text(px, py, label, {
                fontFamily: '"Segoe UI", system-ui, sans-serif',
                fontSize: Math.min(14 + this.tier * 4, 26) + 'px',
                fontStyle: 'bold',
                color: '#' + color.toString(16).padStart(6, '0'),
                stroke: '#000000',
                strokeThickness: 3,
            }).setOrigin(0.5).setDepth(200);

            this.scene.tweens.add({
                targets: this.comboGfx,
                y: py - 40,
                alpha: 0,
                duration: 1200,
                ease: 'Quad.easeOut',
                onComplete: () => { if (this.comboGfx) this.comboGfx.destroy(); this.comboGfx = null; }
            });
        }
    }
    window.ComboSystem = ComboSystem;
    </script>

            difficulties.forEach((diff, i) => {

                // Invisible hit area

                hitArea.on('pointerover', () => {
                    btn.clear();
                    btn.fillStyle(btnColors[i], 0.25);
                    btn.fillRoundedRect(bx - 55, by - 25, 110, 50, 8);
                    btn.lineStyle(2, btnColors[i], 0.7);

                    btn.lineStyle(1.5, btnColors[i], 0.4);
                    btn.strokeRoundedRect(bx - 55, by - 25, 110, 50, 8);

                    this.scene.start('MainGameScene', { difficulty: diff });

            const isMobile = this.sys.game.device.input.touch;

                fontFamily: '"Segoe UI", system-ui, sans-serif',

            tutBtn.fillRoundedRect(tutBtnX - 90, tutBtnY - 18, 180, 36, 8);

            const tutHit = this.add.rectangle(tutBtnX, tutBtnY, 180, 36).setInteractive({ useHandCursor: true }).setAlpha(0.001);

                tutBtn.fillStyle(0xf0c040, 0.22);
                tutBtn.fillRoundedRect(tutBtnX - 90, tutBtnY - 18, 180, 36, 8);
                tutBtn.lineStyle(2, 0xf0c040, 0.6);
                tutBtn.strokeRoundedRect(tutBtnX - 90, tutBtnY - 18, 180, 36, 8);
            });
            tutHit.on('pointerout', () => {
                tutBtn.clear();
                tutBtn.fillStyle(0xf0c040, 0.1);
                tutBtn.fillRoundedRect(tutBtnX - 90, tutBtnY - 18, 180, 36, 8);

            const rulesBtn = this.add.graphics();
            rulesBtn.fillStyle(0x44aaff, 0.1);
            rulesBtn.fillRoundedRect(rBtnX - 90, rBtnY - 18, 180, 36, 8);
            rulesBtn.lineStyle(1.5, 0x44aaff, 0.35);
            rulesBtn.strokeRoundedRect(rBtnX - 90, rBtnY - 18, 180, 36, 8);
            this.add.text(rBtnX, rBtnY, 'RULES & HISTORY', {

                fontSize: '13px', fontStyle: 'bold',
                color: '#44aaff', letterSpacing: '3px',
            }).setOrigin(0.5);
            const rulesHit = this.add.rectangle(rBtnX, rBtnY, 180, 36).setInteractive({ useHandCursor: true }).setAlpha(0.001);
            rulesHit.on('pointerover', () => {

                rulesBtn.fillRoundedRect(rBtnX - 90, rBtnY - 18, 180, 36, 8);
                rulesBtn.lineStyle(2, 0x44aaff, 0.6);
                rulesBtn.strokeRoundedRect(rBtnX - 90, rBtnY - 18, 180, 36, 8);
            });
            rulesHit.on('pointerout', () => {

                rulesBtn.fillRoundedRect(rBtnX - 90, rBtnY - 18, 180, 36, 8);
